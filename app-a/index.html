/* ── xlsx 직접 읽기 (라이브러리 없이: ZIP 파싱 + DEFLATE 해제 + XML 파싱) ── */
function xmlUnesc(s){ return String(s).replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&amp;/g,'&'); }
async function inflateRaw(bytes){
  if(typeof DecompressionStream==='undefined') throw new Error('이 브라우저는 xlsx 압축 해제를 지원하지 않습니다 (최신 Chrome/Edge/Firefox 필요)');
  const s=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(s).arrayBuffer());
}
async function unzipXlsx(buf){
  const dv=new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
  let eocd=-1;
  for(let i=buf.length-22; i>=0 && i>buf.length-22-65557; i--){ if(dv.getUint32(i,true)===0x06054b50){ eocd=i; break; } }
  if(eocd<0) throw new Error('올바른 xlsx(zip) 파일이 아닙니다');
  const count=dv.getUint16(eocd+10,true); let p=dv.getUint32(eocd+16,true);
  const dec=new TextDecoder(), out={}, jobs=[];
  for(let n=0;n<count && p+46<=buf.length && dv.getUint32(p,true)===0x02014b50; n++){
    const method=dv.getUint16(p+10,true), compSize=dv.getUint32(p+20,true),
      nameLen=dv.getUint16(p+28,true), extraLen=dv.getUint16(p+30,true),
      commentLen=dv.getUint16(p+32,true), localOff=dv.getUint32(p+42,true);
    const name=dec.decode(buf.subarray(p+46, p+46+nameLen));
    if(name==='xl/sharedStrings.xml' || /^xl\/worksheets\/sheet\d+\.xml$/.test(name)){
      const lName=dv.getUint16(localOff+26,true), lExtra=dv.getUint16(localOff+28,true);
      const start=localOff+30+lName+lExtra, comp=buf.subarray(start, start+compSize);
      jobs.push((async()=>{ out[name]= method===0 ? comp : await inflateRaw(comp); })());
    }
    p += 46+nameLen+extraLen+commentLen;
  }
  await Promise.all(jobs);
  return out;
}
async function readXlsxRows(file){
  const buf=new Uint8Array(await file.arrayBuffer());
  const ent=await unzipXlsx(buf), dec=new TextDecoder();
  let shared=[];
  if(ent['xl/sharedStrings.xml']){
    const xml=dec.decode(ent['xl/sharedStrings.xml']);
    shared=[...xml.matchAll(/<si\b[^>]*>([\s\S]*?)<\/si>/g)].map(m=>{ let s=''; for(const t of m[1].matchAll(/<t\b[^>]*>([\s\S]*?)<\/t>/g)) s+=xmlUnesc(t[1]); return s; });
  }
  let name=null;
  for(const k in ent){ const mm=k.match(/sheet(\d+)\.xml$/); if(mm && (!name || +mm[1] < +name.match(/(\d+)/)[1])) name=k; }
  if(!name) throw new Error('워크시트를 찾지 못했습니다');
  const sx=dec.decode(ent[name]), rows=[];
  for(const rm of sx.matchAll(/<row\b[^>]*>([\s\S]*?)<\/row>/g)){
    const cells=[];
    for(const cm of rm[1].matchAll(/<c\b([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g)){
      const at=cm[1], inner=cm[2]||'';
      const ref=(at.match(/r="([A-Z]+)\d+"/)||[])[1];
      const ci=ref?colIndex(ref):cells.length;
      const t=(at.match(/t="([^"]+)"/)||[])[1];
      let val='';
      if(t==='s'){ const vi=(inner.match(/<v\b[^>]*>([\s\S]*?)<\/v>/)||[])[1]; val=vi!=null?(shared[+vi]||''):''; }
      else if(t==='inlineStr'){ const im=inner.match(/<t\b[^>]*>([\s\S]*?)<\/t>/); val=im?xmlUnesc(im[1]):''; }
      else { const vm=inner.match(/<v\b[^>]*>([\s\S]*?)<\/v>/); val=vm?vm[1]:''; if(t==='str') val=xmlUnesc(val); }
      cells[ci]=val;
    }
    rows.push(cells);
  }
  return rows;
}

/* ── 통합 업로드: xlsx(바이너리) 또는 CSV/TSV(텍스트) 자동 판별 ── */
async function processUpload(file, mode){
  if(!file) return;
  showLoading(mode==='csv'?'가져오는 중…':'업로드 분석 중…', file.name+' 처리 중입니다');
  const token=++chartToken;
  try{
    let rows;
    const sig=new Uint8Array(await file.slice(0,4).arrayBuffer());
    if(sig[0]===0x50 && sig[1]===0x4B){ rows=await readXlsxRows(file); }        // 'PK' = xlsx/zip
    else {
      const text=await file.text(); const lines=text.replace(/\r/g,'').split('\n');
      while(lines.length && lines[lines.length-1]==='') lines.pop();
      const tab=text.indexOf('\t')>=0 && text.indexOf(',')<0;
      rows=lines.map(l=> tab? l.split('\t') : splitCSVLine(l));
    }
    if(token!==chartToken) return;
    if(mode==='csv'){ hideLoading(); importRowsAsSheet(rows); return; }
    // 형식 자동 판별: #INIT 블록이 있으면 세로 로그, 아니면 가로 템플릿
    const isLog = rows.some(r=>String(r&&r[0]!=null?r[0]:'').trim()==='#INIT');
    const parsed = isLog ? parseTestLogRows(rows) : parseMeasurementRows(rows);
    let sh, msg;
    if(parsed){ sh=buildQCSheet('측정데이터', parsed.pts, parsed.serials, parsed.meta);
      const uP=Math.min(parsed.pts.length,MAX_POINTS), uN=Math.min(parsed.serials.length,ROWS-13);
      msg='📤 업로드 완료 ('+(isLog?'세로 로그':'가로 템플릿')+') · 시료 '+uN+'개 · 포인트 '+uP+'개'+(parsed.truncated?' (한도 초과분은 잘림)':''); }
    else { sh=genQCData('측정데이터');
      msg='📤 업로드 완료 (형식 미인식 → 더미 데이터로 시연)'; }
    hideLoading(); replaceQCSheet(sh); toast(msg);   // 새 시트 만들지 않고 측정데이터 교체
  }catch(e){ hideLoading(); toast('업로드 실패: '+(e&&e.message||e)); }
}
function importRowsAsSheet(rows){
  const sh=newSheet('측정데이터'); sh.kind='data';
  let maxC=0, rowsN=Math.min(rows.length,ROWS);
  for(let r=0;r<rowsN;r++){ const row=rows[r]||[];
    for(let c=0;c<row.length && c<COLS;c++){ const v=row[c]==null?'':String(row[c]); if(v!==''){ sh.data[key(r,c)]={v}; if(c>maxC)maxC=c; } } }
  replaceQCSheet(sh);   // 새 시트 없이 측정데이터 교체
  toast('📃 가져오기 완료 · '+rowsN+'행 × '+(maxC+1)+'열');
}

/* ── 텍스트 나누기 (선택 열을 구분자로 분리) ── */
function textToColumns(){
  if(isChartSheet()){ toast('그리드 시트에서 사용하세요'); return; }
  const n=norm(sel);
  const inp=prompt('구분 기호를 입력하세요 (쉼표 = ,  /  탭 = \\t  /  공백 = space)', ',');
  if(inp==null) return;
  const d = inp==='\\t'?'\t' : (inp.toLowerCase()==='space'?' ' : (inp===''?',':inp));
  const chs=[]; let split=0;
  for(let r=n.r1;r<=n.r2;r++){
    const cell=sheet().data[key(r,n.c1)];
    const rawv=cell&&cell.v!=null?String(cell.v):'';
    if(rawv==='') continue;
    const parts=rawv.split(d);
    if(parts.length>1) split++;
    for(let i=0;i<parts.length && n.c1+i<COLS;i++){
      const tc=n.c1+i, k=key(r,tc); record(chs,r,tc);
      const val=parts[i];
      if(val===''){ const cc=sheet().data[k]; if(cc) delete cc.v; }
      else { const cc=sheet().data[k]||(sheet().data[k]={}); cc.v=val; }
    }
  }
  finish(chs);
  toast(split? '🧱 텍스트 나누기 완료 · '+split+'개 셀 분리 (구분: '+(d==='\t'?'탭':d===' '?'공백':d)+')' : '나눌 구분자가 없습니다');
}

/* ── 중복된 항목 제거 (선택 범위 행 기준) ── */
function removeDuplicates(){
  if(isChartSheet()){ toast('그리드 시트에서 사용하세요'); return; }
  const n=norm(sel);
  if(n.r1===n.r2){ toast('두 행 이상 선택한 뒤 실행하세요'); return; }
  const rowKey=r=>{ const a=[]; for(let c=n.c1;c<=n.c2;c++){ const cell=sheet().data[key(r,c)]; a.push(cell&&cell.v!=null?String(cell.v):''); } return a.join(''); };
  const seen=new Set(), snap=[];
  for(let r=n.r1;r<=n.r2;r++){ const k=rowKey(r); if(seen.has(k)) continue; seen.add(k);
    const row=[]; for(let c=n.c1;c<=n.c2;c++) row.push(cloneCell(sheet().data[key(r,c)])); snap.push(row); }
  const total=n.r2-n.r1+1, removed=total-snap.length;
  if(removed===0){ toast('중복된 항목이 없습니다'); return; }
  const chs=[];
  for(let i=0;i<total;i++){ const r=n.r1+i; for(let c=n.c1;c<=n.c2;c++) record(chs,r,c); }
  for(let i=0;i<total;i++){ const r=n.r1+i;
    for(let cc=0;cc<=n.c2-n.c1;cc++){ const c=n.c1+cc, k=key(r,c);
      if(i<snap.length){ const cell=snap[i][cc]; if(cell) sheet().data[k]=cloneCell(cell); else delete sheet().data[k]; }
      else delete sheet().data[k]; } }
  finish(chs);
  sel={r1:n.r1,c1:n.c1,r2:n.r1+snap.length-1,c2:n.c2}; aR=n.r1; aC=n.c1; renderSel();
  toast('🚫 중복 '+removed+'개 행 제거 · '+snap.length+'행 남음');
}
/* 측정데이터 시트를 새 시트로 "제자리 교체"(새 시트 만들지 않음) → 항상 4개 시트만 유지 */
function replaceQCSheet(sh){
  sh.name='측정데이터';
  let idx=sheets.findIndex(s=>s.name.indexOf('측정데이터')===0);
  if(idx<0) idx=sheets.findIndex(s=>s.kind==='data' && !s.landing);
  if(idx>=0) sheets[idx]=sh; else { sheets.push(sh); idx=sheets.length-1; }
  qcSource=sh;
  switchSheet(idx);   // 같은 인덱스여도 새 내용으로 다시 렌더
}
function loadQCSample(){
  showLoading('측정 데이터 불러오는 중…','더미 데이터를 생성하고 있습니다');
  const token=++chartToken;
  setTimeout(()=>{
    if(token!==chartToken) return;
    const sh=genQCData('측정데이터');
    hideLoading();
    replaceQCSheet(sh);
    toast('📥 새 측정 더미 데이터로 갱신했습니다 · 정규분포/산점도/박스플롯에 반영됨');
  }, 320);
}

/* ══════════════ 차트 시트 (정규분포 · 산점도 · 박스플롯) ══════════════ */
let qcSource = null;      // 차트가 참조할 측정데이터 시트
let chartToken = 0;       // 로딩 중 시트 전환 시 옛 렌더 취소용
let lastChartData = {type:'normal', points:[]};   // 내보내기용 현재 차트 데이터
let selectedIdx = new Set();                        // 다중 선택된 카드 인덱스
function newChartSheet(name,type,framed){ return {name, kind:'chart', chart:type, framed:!!framed, data:{}, colW:{}, rowH:{}}; }
function gotoSheet(name){ const i=sheets.findIndex(s=>s.name===name); if(i>=0 && i!==cur) switchSheet(i); }

function quantile(sorted, q){
  const n=sorted.length; if(!n) return 0; if(n===1) return sorted[0];
  const pos=(n-1)*q, lo=Math.floor(pos), hi=Math.ceil(pos);
  return sorted[lo]+(sorted[hi]-sorted[lo])*(pos-lo);
}
function extractQC(){
  let src=qcSource;
  if(!src || !src.data || !src.data['1,0']) src=sheets.find(s=>s.kind!=='chart' && s.data['1,0'] && /포인트/.test(String(s.data['1,0'].v)));
  if(!src) src=sheets.find(s=>s.name.indexOf('측정데이터')===0);
  if(!src || !src.data['1,1']) return null;
  const D=src.data, num=k=>{ const c=D[k]; return c?Number(c.v):NaN; };
  const pts=[];
  for(let c=1;c<COLS;c++){ const h=D['1,'+c]; if(!h||h.v===''||h.v==null) break;
    pts.push({no:String(h.v), spec:num('2,'+c), usl:num('3,'+c), lsl:num('4,'+c), col:c, values:[]}); }
  if(!pts.length || !pts.some(p=>isFinite(p.usl)||isFinite(p.lsl))) return null;   // 규격 없으면 QC 데이터 아님
  const STOP=/^(검사 수|평균|최소값|최대값|상한 NG|하한 NG|판정)$/;   // 시리얼이 비숫자여도 안전하게 요약행에서 멈춤
  for(let r=6;r<ROWS;r++){ const c0=D[r+',0']; if(!c0||c0.v===''||c0.v==null) break; if(STOP.test(String(c0.v))) break;
    for(const p of pts){ const cell=D[r+','+p.col]; if(cell&&cell.v!=='') { const v=Number(cell.v); if(isFinite(v)) p.values.push(v); } } }
  for(const p of pts){
    const v=p.values, n=v.length;
    const mean=n?v.reduce((a,b)=>a+b,0)/n:0;
    const varc=n>1?v.reduce((a,b)=>a+(b-mean)**2,0)/(n-1):0, std=Math.sqrt(varc);
    const srt=[...v].sort((a,b)=>a-b);
    p.n=n; p.mean=mean; p.std=std; p.min=srt[0]||0; p.max=srt[n-1]||0;
    p.q1=quantile(srt,.25); p.med=quantile(srt,.5); p.q3=quantile(srt,.75);
    p.uNG=v.filter(x=>x>p.usl).length; p.lNG=v.filter(x=>x<p.lsl).length;
    p.cp=std>0?(p.usl-p.lsl)/(6*std):null;
    p.cpk=std>0?Math.min(p.usl-mean,mean-p.lsl)/(3*std):null;
  }
  // FPY(대별 양품률): 한 대의 모든 포인트가 규격 내면 그 대는 합격
  let uPass=0, uTot=0;
  for(let r=6;r<ROWS;r++){ const c0=D[r+',0']; if(!c0||c0.v===''||c0.v==null) break; if(STOP.test(String(c0.v))) break; uTot++;
    let ok=true;
    for(const p of pts){ const cell=D[r+','+p.col]; if(cell&&cell.v!==''){ const v=Number(cell.v);
      if(isFinite(v) && ((isFinite(p.usl)&&v>p.usl)||(isFinite(p.lsl)&&v<p.lsl))){ ok=false; break; } } }
    if(ok) uPass++; }
  return {points:pts, N:pts[0]?pts[0].n:0, src:src.name, meta:src.meta||null, fpy: uTot?uPass/uTot*100:null};
}

/* SVG 헬퍼 */
const CHT={ data:'#2a78d6', ng:'#d03b3b', usl:'#d03b3b', lsl:'#2f6fd0', spec:'#0ca30c',
  mean:'#eb6834', grid:'#ececeb', axis:'#c3c2b7', muted:'#9a9a96', bar:'#9ec5f4', barS:'#2a78d6', boxF:'#dbeafe',
  bandOK:'#0ca30c', bandNG:'#d03b3b' };
const CW=340, CH=258;
const rnd=x=>Math.round(x*10)/10;
const f3=v=>isFinite(v)?v.toFixed(3):'—', f2=v=>v==null||!isFinite(v)?'—':v.toFixed(2);
function escH(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sLine(x1,y1,x2,y2,col,w,dash){ return '<line x1="'+rnd(x1)+'" y1="'+rnd(y1)+'" x2="'+rnd(x2)+'" y2="'+rnd(y2)+'" stroke="'+col+'" stroke-width="'+(w||1)+'"'+(dash?' stroke-dasharray="'+dash+'"':'')+'/>'; }
function sTxt(x,y,t,anchor,col,size){ return '<text x="'+rnd(x)+'" y="'+rnd(y)+'" text-anchor="'+anchor+'" fill="'+col+'" font-size="'+(size||9)+'" font-family="Pretendard Variable,Pretendard,Segoe UI,Malgun Gothic,sans-serif">'+escH(t)+'</text>'; }
/* 2줄 라벨: 한글(위) + 영어·값(아래) */
function sTxt2(x,y,l1,l2,anchor,col){
  return '<text x="'+rnd(x)+'" y="'+rnd(y)+'" text-anchor="'+anchor+'" fill="'+col+'" font-size="8.3" font-family="Pretendard Variable,Pretendard,Segoe UI,Malgun Gothic,sans-serif">'
    +'<tspan x="'+rnd(x)+'" font-weight="700">'+escH(l1)+'</tspan>'
    +'<tspan x="'+rnd(x)+'" dy="9">'+escH(l2)+'</tspan></text>';
}
function wrapSVG(inner,w,h){ w=w||CW; h=h||CH; return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet">'+inner+'</svg>'; }
/* 하단 값 스트립: 상한(빨강) · 평균(주황) · 하한(파랑) */
function valueStrip(ml,pw,y,pt){
  return sTxt(ml, y, '하한 '+f3(pt.lsl), 'start', CHT.lsl, 9)         // 좌 = 하한(LSL, 그래프 왼쪽과 일치)
    + sTxt(ml+pw/2, y, '평균 '+f3(pt.mean), 'middle', CHT.mean, 9)
    + sTxt(ml+pw, y, '상한 '+f3(pt.usl), 'end', CHT.usl, 9);          // 우 = 상한(USL)
}
/* 정상범위(초록)·이탈범위(빨강) 가로 밴드 — 값이 세로축인 차트용 */
function vBands(ml,pw,mt,ph,yU,yL){
  return '<rect x="'+ml+'" y="'+rnd(yU)+'" width="'+pw+'" height="'+rnd(yL-yU)+'" fill="'+CHT.bandOK+'" fill-opacity="0.10"/>'
    +'<rect x="'+ml+'" y="'+mt+'" width="'+pw+'" height="'+rnd(yU-mt)+'" fill="'+CHT.bandNG+'" fill-opacity="0.05"/>'
    +'<rect x="'+ml+'" y="'+rnd(yL)+'" width="'+pw+'" height="'+rnd(mt+ph-yL)+'" fill="'+CHT.bandNG+'" fill-opacity="0.05"/>';
}

function svgScatter(pt){
  const ml=46,mr=52,mt=14,mb=30,pw=CW-ml-mr,ph=CH-mt-mb;
  const v=pt.values, n=v.length;
  let lo=Math.min(pt.min,pt.lsl), hi=Math.max(pt.max,pt.usl); const pad=(hi-lo)*0.12||1; lo-=pad; hi+=pad;   // 데이터 구간에 맞춰 자동 스케일
  const yP=x=>mt+ph-(x-lo)/(hi-lo)*ph, xP=i=>ml+(n<=1?pw/2:i/(n-1)*pw);
  let s='';
  s+=vBands(ml,pw,mt,ph,yP(pt.usl),yP(pt.lsl));
  for(let t=0;t<=4;t++){ const val=lo+(hi-lo)*t/4, y=yP(val); s+=sLine(ml,y,ml+pw,y,CHT.grid,1)+sTxt(ml-5,y+3,f3(val),'end',CHT.muted,8.5); }
  s+=sLine(ml,yP(pt.usl),ml+pw,yP(pt.usl),CHT.usl,1.3,'5 3');
  s+=sLine(ml,yP(pt.lsl),ml+pw,yP(pt.lsl),CHT.lsl,1.3,'5 3');
  s+=sLine(ml,yP(pt.spec),ml+pw,yP(pt.spec),CHT.spec,1.2,'5 3');
  s+=sLine(ml,yP(pt.mean),ml+pw,yP(pt.mean),CHT.mean,1.2);
  s+=alignedValueLabelsY(pt, yP, ml+pw, ml+pw+4, mt+8, mt+ph-12);   // 상한/하한/목표/평균을 각 값의 y 위치(우측)에
  // 시료 순서대로 잇는 추세선
  let d=''; for(let i=0;i<n;i++) d+=(i?'L':'M')+rnd(xP(i))+' '+rnd(yP(v[i]));
  s+='<path d="'+d+'" fill="none" stroke="'+CHT.data+'" stroke-width="0.9" stroke-opacity="0.4"/>';
  // 성능: 정상 점은 하나의 path(둥근 캡 점)로, 이탈 점만 개별 원으로
  let dots='', ng='';
  for(let i=0;i<n;i++){ const x=v[i], X=rnd(xP(i)), Y=rnd(yP(x));
    if(x>pt.usl||x<pt.lsl) ng+='<circle cx="'+X+'" cy="'+Y+'" r="2.6" fill="'+CHT.ng+'"><title>이상 #'+(i+1)+': '+f3(x)+'</title></circle>';
    else dots+='M'+X+' '+Y+'h0.01'; }
  if(dots) s+='<path d="'+dots+'" stroke="'+CHT.data+'" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7" fill="none"/>';
  s+=ng;
  s+=sTxt(ml,mt+ph+12,'1','start',CHT.muted,8.5)+sTxt(ml+pw,mt+ph+12,String(n),'end',CHT.muted,8.5)+sTxt(ml+pw/2,mt+ph+12,'시료 순서 →','middle',CHT.muted,8.5);
  return wrapSVG(s);
}
/* 값이 가로축인 차트(정규분포)용: 하한/목표/평균/상한 숫자를 각자의 x 위치에 배치.
   겹치면 최소 간격으로 밀고, 밀린 라벨은 실제 위치로 콜아웃 선을 그어 연결. */
function alignedValueLabels(pt, xP, ml, pw, yTop, yLabel){
  const src=[[pt.lsl,'하한',CHT.lsl],[pt.spec,'목표',CHT.spec],[pt.mean,'평균',CHT.mean],[pt.usl,'상한',CHT.usl]];
  const arr=[];
  for(const o of src){ if(isFinite(o[0])) arr.push({v:o[0],t:o[1],c:o[2],x:Math.max(ml,Math.min(ml+pw,xP(o[0])))}); }
  arr.sort((a,b)=>a.x-b.x);
  const gap=42, lx=[];
  arr.forEach((o,i)=>{ let x=o.x; if(i>0 && x<lx[i-1]+gap) x=lx[i-1]+gap; lx.push(x); });
  const over=lx.length?lx[lx.length-1]-(ml+pw):0;
  if(over>0) for(let i=0;i<lx.length;i++) lx[i]=Math.max(ml, lx[i]-over);
  let s='';
  arr.forEach((o,i)=>{ const x=lx[i];
    if(Math.abs(x-o.x)>1.5) s+='<path d="M'+rnd(o.x)+' '+rnd(yTop)+' L'+rnd(o.x)+' '+rnd(yTop+5)+' L'+rnd(x)+' '+rnd(yLabel-11)+' L'+rnd(x)+' '+rnd(yLabel-7)+'" fill="none" stroke="'+o.c+'" stroke-width="0.7" stroke-opacity="0.75"/>';
    s+=sTxt2(x, yLabel, f3(o.v), o.t, 'middle', o.c);   // 위: 값 / 아래: 이름(하한·상한 등)
  });
  return s;
}
/* 값이 세로축인 차트(산점도·박스)용: 상한/목표/평균/하한 숫자를 각자의 y 위치(플롯 우측)에 배치.
   세로로 겹치면 최소 간격으로 밀고, 밀린 라벨은 실제 선 높이로 콜아웃 선을 그어 연결. */
function alignedValueLabelsY(pt, yP, xLine, xLabel, yTopBound, yBotBound){
  const src=[[pt.usl,'상한',CHT.usl],[pt.spec,'목표',CHT.spec],[pt.mean,'평균',CHT.mean],[pt.lsl,'하한',CHT.lsl]];
  const arr=[];
  for(const o of src){ if(isFinite(o[0])) arr.push({v:o[0],t:o[1],c:o[2],y:Math.max(yTopBound,Math.min(yBotBound,yP(o[0])))}); }
  arr.sort((a,b)=>a.y-b.y);
  const gap=17, ly=[];
  arr.forEach((o,i)=>{ let y=o.y; if(i>0 && y<ly[i-1]+gap) y=ly[i-1]+gap; ly.push(y); });
  const over=ly.length?ly[ly.length-1]-yBotBound:0;
  if(over>0) for(let i=0;i<ly.length;i++) ly[i]=Math.max(yTopBound, ly[i]-over);
  let s='';
  arr.forEach((o,i)=>{ const y=ly[i];
    if(Math.abs(y-o.y)>1.5) s+='<path d="M'+rnd(xLine)+' '+rnd(o.y)+' L'+rnd(xLine+3)+' '+rnd(o.y)+' L'+rnd(xLabel-2)+' '+rnd(y+3)+'" fill="none" stroke="'+o.c+'" stroke-width="0.7" stroke-opacity="0.75"/>';
    s+=sTxt2(xLabel, y, f3(o.v), o.t, 'start', o.c);   // 위: 값 / 아래: 이름
  });
  return s;
}
function svgNormal(pt){
  const ml=44,mr=14,mt=30,mb=54,pw=CW-ml-mr,ph=CH-mt-mb;
  const v=pt.values, n=v.length;
  let lo=Math.min(pt.min,pt.lsl), hi=Math.max(pt.max,pt.usl); const pad=(hi-lo)*0.10||1; lo-=pad; hi+=pad;
  const K=11, bw=(hi-lo)/K, freq=new Array(K).fill(0);
  for(const x of v){ let i=Math.floor((x-lo)/bw); if(i<0)i=0; if(i>=K)i=K-1; freq[i]++; }

function svgBox(pt){

  for(const x of pt.values){ if(x<loF||x>hiF){ const out=x>pt.usl||x<pt.lsl; s+='<circle cx="'+rnd(cx)+'" cy="'+rnd(yP(x))+'" r="2.2" fill="none" stroke="'+(out?CHT.ng:CHT.barS)+'" stroke-width="1.1"/>'; } }

function svgBoxOverview(pts, targetW){
  const P=pts.length, OML=54, OMR=16, OMT=16, OMB=30, OH=250,
        OW=targetW||(OML+Math.max(30,Math.min(58,1100/P))*P+OMR), OPW=OW-OML-OMR, step=OPW/P, OPH=OH-OMT-OMB;

  [-1.5,-1,-0.5,0,0.5,1,1.5].forEach(z=>{ const y=yP(z), lim=Math.abs(z)===1, ctr=z===0;
    s+=sLine(OML,y,OML+OPW,y,lim?CHT.usl:(ctr?CHT.spec:CHT.grid),lim||ctr?1.2:1,lim?'5 3':(ctr?'5 3':''));
    s+=sTxt(OML-6,y+3,(z>0?'+':'')+z,'end',lim?CHT.usl:(ctr?'#0a8a0a':CHT.muted),9); });
  pts.forEach((pt,idx)=>{ const th=(pt.usl-pt.lsl)/2||1, z=x=>(x-pt.spec)/th, cx=OML+step*idx+step/2, bw=Math.min(22,step*.5);

    cardStart = 10 + OVH + 1;
  }
  const cardCols=[]; for(let i=0;i<PERROW;i++) cardCols.push(C0+i*(CS+1));
  pts.forEach((p,idx)=>{ const rr=Math.floor(idx/PERROW), r=cardStart+rr*(RS+GAP), c=cardCols[idx%PERROW];
    push(r,c,CS,RS,'fx-card', buildChartCard(p,type,idx)); });
  const lastRow = pts.length ? (cardStart+(Math.ceil(pts.length/PERROW)-1)*(RS+GAP)+RS) : cardStart+2;
  const totalRows=Math.max(lastRow+2, Math.ceil(vh/ROWH));
  const occ=new Set(), origin={};
  for(const it of items){ origin[it.r+','+it.c]=it; for(let dr=0;dr<it.rs;dr++)for(let dc=0;dc<it.cs;dc++){ if(dr||dc) occ.add((it.r+dr)+','+(it.c+dc)); } }
  const widths=[];
  for(let c=1;c<=totalCols;c++){
    if(c<=MARGIN || c>totalCols-MARGIN) widths.push(padW);             // 좌/우 여백 (가변, 개수 반응형)
    else if(c===MARGIN+1 || c===totalCols-MARGIN) widths.push(NARROW); // 좌갭 / 우갭
    else widths.push(((c-C0)%2===0)?WIDE:NARROW);                      // 콘텐츠
  }
  const cg=xlColgroup(widths, sh);
  let head='<tr><th class="xh corner"></th>'; for(let c=1;c<=totalCols;c++) head+='<th class="xh">'+colName(c-1)+'</th>'; head+='</tr>';
  let body='';
  for(let r=1;r<=totalRows;r++){
    body+=trTag(r, sh)+'<th class="rn">'+r+'</th>';
    for(let c=1;c<=totalCols;c++){
      if(occ.has(r+','+c)) continue;
      const it=origin[r+','+c];
      if(it) body+='<td class="'+it.cls+'"'+(it.cs>1?' colspan="'+it.cs+'"':'')+(it.rs>1?' rowspan="'+it.rs+'"':'')+'>'+it.html+'</td>';
      else body+='<td class="fill"></td>';
    }
    body+='</tr>';
  }
  const selbar='<div class="cv-selbar" id="cv-selbar"><span class="seln">0개 선택됨</span><button data-selact="copy">📋 복사</button><button data-selact="save">💾 저장</button><span class="sep"></span><button class="clear" data-selact="clear">선택 해제</button></div>';
  cv.innerHTML=selbar+'<div class="xl-wrap"><table class="xl-grid fx"><colgroup>'+cg+'</colgroup><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
}
function tile(val,label,cls){ return '<div class="tile'+(cls?' '+cls:'')+'"><div class="tv">'+escH(val)+'</div><div class="tl">'+escH(label)+'</div></div>'; }
function ptLabel(no){ return /^\d+$/.test(String(no)) ? ('P'+no) : String(no); }   // 숫자면 P접두, 항목명이면 그대로

/* ══════════════ 차트 내보내기 (복사 / 저장) ══════════════ */
const TYPE_KO={normal:'정규분포',scatter:'산점도',box:'박스플롯'};
function chartSVG(pt,type){ return type==='normal'?svgNormal(pt):type==='scatter'?svgScatter(pt):svgBox(pt); }
function innerOf(svg){ return svg.replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,''); }
/* 라벨(제목·스펙·통계)까지 포함한 독립 SVG 생성 */
function buildExportSVG(pt,type){
  const inner=innerOf(chartSVG(pt,type)), hgt=72, W=CW, H=CH+hgt;
  const ng=pt.uNG+pt.lNG, rate=pt.n?ng/pt.n*100:0, FF='Pretendard Variable,Pretendard,Segoe UI,Malgun Gothic,sans-serif';
  let s='<rect width="'+W+'" height="'+H+'" fill="#ffffff"/>';
  s+='<text x="12" y="23" font-family="'+FF+'" font-size="15" font-weight="700" fill="#222">'+escH(ptLabel(pt.no))+'</text>';
  s+='<text x="'+(W-12)+'" y="22" text-anchor="end" font-family="'+FF+'" font-size="11.5" font-weight="700" fill="'+(ng?CHT.ng:'#0a8a0a')+'">'+(ng?'NG '+ng+' · 불량률 '+rate.toFixed(1)+'%':'OK · 불량 0')+'</text>';
  s+='<text x="12" y="41" font-family="'+FF+'" font-size="10.5" fill="#777">스펙 '+f3(pt.spec)+'  ·  상한 '+f3(pt.usl)+'  ·  하한 '+f3(pt.lsl)+'</text>';
  s+='<text x="12" y="59" font-family="'+FF+'" font-size="11" fill="#333">평균 '+f3(pt.mean)+'  ·  σ '+f3(pt.std)+'  ·  Cpk '+f2(pt.cpk)+'</text>';
  s+='<line x1="0" y1="'+(hgt-1)+'" x2="'+W+'" y2="'+(hgt-1)+'" stroke="#ededed"/>';
  s+='<g transform="translate(0,'+hgt+')">'+inner+'</g>';
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'+s+'</svg>';
}
function svgToCanvas(svgStr,scale){
  return new Promise((res,rej)=>{
    const vb=svgStr.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/), w=+vb[1], h=+vb[2];
    const img=new Image();
    img.onload=()=>{ const cv=document.createElement('canvas'); cv.width=Math.round(w*scale); cv.height=Math.round(h*scale);
      const ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height); ctx.drawImage(img,0,0,cv.width,cv.height); res(cv); };
    img.onerror=()=>rej(new Error('SVG 렌더 실패'));
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);
  });
}
async function buildMontage(points,type,title){
  const scale=2, pad=14, cardW=CW, cardH=CH+72, titleH=46;
  const cols = points.length<=1?1 : points.length<=3?points.length : points.length<=8?4 : points.length<=15?5 : 6;
  const rows=Math.ceil(points.length/cols);
  const W=Math.round((cardW*cols+pad*(cols+1))*scale), H=Math.round((titleH+cardH*rows+pad*(rows+1))*scale);
  const m=document.createElement('canvas'); m.width=W; m.height=H;
  const ctx=m.getContext('2d'); ctx.fillStyle='#f3f3f2'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1e1e1e'; ctx.textBaseline='middle'; ctx.font='700 '+(20*scale)+'px "Pretendard Variable","Pretendard","Segoe UI","Malgun Gothic",sans-serif';
  ctx.fillText(title, pad*scale, (titleH/2+pad/2)*scale);
  for(let i=0;i<points.length;i++){
    const cv=await svgToCanvas(buildExportSVG(points[i],type),scale);
    const col=i%cols, row=Math.floor(i/cols);
    const x=Math.round((pad+col*(cardW+pad))*scale), y=Math.round((titleH+pad+row*(cardH+pad))*scale);
    ctx.fillStyle='#fff'; ctx.fillRect(x,y,cardW*scale,cardH*scale); ctx.drawImage(cv,x,y);
  }
  return m;
}
function downloadCanvas(cv,name){ cv.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); },'image/png'); }
async function copyCanvas(cv){
  if(!navigator.clipboard||!window.ClipboardItem) throw new Error('unsupported');
  const blob=await new Promise(r=>cv.toBlob(r,'image/png'));
  await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
}
async function outputCanvas(cv,act,name,okMsg){
  if(act==='save'){ downloadCanvas(cv,name); toast('💾 '+okMsg+' 저장됨'); }
  else { try{ await copyCanvas(cv); toast('📋 '+okMsg+' 클립보드에 복사됨'); }
    catch(e){ downloadCanvas(cv,name); toast('📋 복사 미지원 브라우저 — '+okMsg+' 파일로 저장했어요'); } }
}
async function exportSingle(idx,act){

}
async function exportMany(points,act,tag){

function showLoading(msg,sub){ $('ld-msg').textContent=msg||'차트 생성 중…'; $('ld-sub').textContent=sub||'데이터를 분석하고 있습니다'; $('loading').classList.add('show'); }

/* ── xl-grid(요약·차트 틀 뷰) 공용: 열 너비 colgroup + 행 tr (사용자 조절값 반영) ── */
function xlColgroup(widths, sh){
  let cg='<col style="width:42px">'; const fx=sh&&sh.fxCol;
  for(let i=0;i<widths.length;i++){ const c=i+1; cg+='<col style="width:'+((fx&&fx[c]!=null)?fx[c]:widths[i])+'px">'; }
  return cg;
}
function trTag(rn, sh, cls){ const h=sh&&sh.fxRow&&sh.fxRow[rn]; return '<tr'+(cls?' class="'+cls+'"':'')+(h!=null?' style="height:'+h+'px"':'')+'>'; }

/* ── xl-grid 열/행 드래그 리사이즈 (사용자가 직접 폭·높이 조절) ── */
let xlRz=null;
function xlEdge(e){
  const t=e.target; if(!t||t.tagName!=='TH') return null;
  if(!t.closest('#data-view,#chart-view')) return null;
  const table=t.closest('table.xl-grid'); if(!table) return null;
  const r=t.getBoundingClientRect();
  if(t.classList.contains('xh') && !t.classList.contains('corner') && r.right-e.clientX<=6){
    const idx=[...t.parentElement.children].indexOf(t);   // corner=0, 데이터열 A=1…
    return {type:'col', col:table.querySelectorAll('col')[idx], idx};
  }
  if(t.classList.contains('rn') && r.bottom-e.clientY<=6) return {type:'row', tr:t.parentElement, rn:+t.textContent};
  return null;
}
document.addEventListener('mousedown', e=>{
  const ed=xlEdge(e); if(!ed) return; e.preventDefault();
  xlRz = ed.type==='col' ? {type:'col', col:ed.col, idx:ed.idx, x:e.clientX, w:ed.col.offsetWidth}
                         : {type:'row', tr:ed.tr, rn:ed.rn, y:e.clientY, h:ed.tr.offsetHeight};
});
document.addEventListener('mousemove', e=>{
  if(!xlRz){ const ed=xlEdge(e); const cur=ed?(ed.type==='col'?'col-resize':'row-resize'):'';
    if(ed) document.body.style.cursor=cur; else if(/resize/.test(document.body.style.cursor)) document.body.style.cursor=''; return; }
  if(xlRz.type==='col'){ const w=Math.max(14, xlRz.w+e.clientX-xlRz.x); xlRz.col.style.width=w+'px'; xlRz.nw=w; }
  else { const h=Math.max(12, xlRz.h+e.clientY-xlRz.y); xlRz.tr.style.height=h+'px'; xlRz.nh=h; }
});
document.addEventListener('mouseup', ()=>{
  if(!xlRz) return; const sh=sheet();
  if(xlRz.type==='col' && xlRz.nw!=null){ sh.fxCol=sh.fxCol||{}; sh.fxCol[xlRz.idx]=xlRz.nw; }
  if(xlRz.type==='row' && xlRz.nh!=null){ sh.fxRow=sh.fxRow||{}; sh.fxRow[xlRz.rn]=xlRz.nh; }
  xlRz=null; document.body.style.cursor='';
});

/* 측정데이터 요약 뷰 (무거운 19,200셀 그리드 대신 — 성공 배너 + 지표 + 30행 미리보기) */
/* 랜딩 시안 — 엑셀 그리드(행번호·열문자·셀) 위에 얹은 3가지 컨셉 */
function landingFrame(buildRows){
  const NC=12, PTW=112, DW=92, ROWH=21, sh=sheet();
  const contentW=PTW+(NC-1)*DW;
  const dv=$('data-view'), vw=dv.clientWidth||1200, vh=dv.clientHeight||600;
  const leftover=Math.max(0, vw-42-contentW);
  let padPer=2; { const per=leftover/(padPer*2); if(per>95) padPer=3; else if(per<40) padPer=1; }
  const padW=Math.max(12, Math.round(leftover/(padPer*2)));
  const totalCols=padPer+NC+padPer;
  const fill=n=>{ let s=''; for(let i=0;i<n;i++) s+='<td class="fill"></td>'; return s; };
  const LP=fill(padPer), RP=fill(padPer);
  const widths=[]; for(let i=0;i<padPer;i++) widths.push(padW); widths.push(PTW); for(let i=1;i<NC;i++) widths.push(DW); for(let i=0;i<padPer;i++) widths.push(padW);
  const cg=xlColgroup(widths, sh);
  let head='<tr><th class="xh corner"></th>'; for(let c=0;c<totalCols;c++) head+='<th class="xh">'+colName(c)+'</th>'; head+='</tr>';
  let rn=1, body='';
  const R=cells=>{ body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP+cells+RP+'</tr>'; rn++; };
  const blank=()=>R(fill(NC));
  const contRows=k=>{ for(let i=0;i<k;i++){ body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP+RP+'</tr>'; rn++; } };   // rowspan 셀 아래로 이어지는 행(패딩 열만)
  buildRows({R, blank, contRows});
  const totalRows=Math.max(rn-1+3, Math.ceil(vh/ROWH)+1);
  for(; rn<=totalRows; rn++) body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+fill(totalCols)+'</tr>';
  return '<div class="xl-wrap"><table class="xl-grid"><colgroup>'+cg+'</colgroup><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
}
/* 등비(r=1.22^⅓≈1.0685) 자기유사 사각 밴드 스택 — 큰 것부터 그려 작은 것이 위에 얹힘.
   색은 18주기(3앵커 그린을 6단계씩 보간한 순환 램프): wrapper가 r¹⁸(=1.22⁶)배 확대되면
   밴드 k가 밴드 k+18(같은 색) 자리에 정확히 도달 → 무이음 루프. */
function lpZoomHTML(){
  const r=Math.pow(1.22,1/3), kMax=12, kMin=-78,
        cols=['#18a35b','#179d57','#159652','#14904e','#13894a','#118345','#107c41','#107a40','#10783f','#10763f','#0f743e','#0f723d','#0f703c','#117941','#128146','#148a4c','#159251','#179b56'];
  let s='<div class="lp-zoom">';
  for(let k=kMax;k>=kMin;k--){
    const p=(100*Math.pow(r,k)).toFixed(3);
    s+='<div class="zb" style="width:'+p+'%;height:'+p+'%;background:'+cols[((k%18)+18)%18]+'"></div>';
  }
  return s+'</div>';
}

     +'<td class="lp-a-step" colspan="4" rowspan="3"><div class="st-ic">📊</div><b>2단계 · 분포 확인</b><span>정규분포·산점도·박스플롯 탭으로 전환해 그래프를 확인</span></td>'

     +'<td class="lp-a-nav" colspan="3" onclick="gotoSheet(\'정규분포\')"><div class="nv-ic">📊</div><b>정규분포</b></td>'
     +'<td class="lp-a-nav" colspan="3" onclick="gotoSheet(\'산점도\')"><div class="nv-ic">⚬</div><b>산점도</b></td>'
     +'<td class="lp-a-nav" colspan="3" onclick="gotoSheet(\'박스플롯\')"><div class="nv-ic">📦</div><b>박스플롯</b></td>');

/* 포인트별 요약을 "엑셀 리포트처럼" — 상단 1~4행에 정보, 표는 여백 열(A) 다음부터 (오른쪽/아래 더미 격자 포함) */
function renderPointStatsTable(qc){
  const pct=(x,n)=> n>0 ? (x/n*100).toFixed(2)+'%' : '-';
  const labels=['포인트','타겟 치수','상한','하한','모수','평균','상한 NG','하한 NG','총 NG','상한 불량률','하한 불량률','총 불량률'];
  const NC=labels.length, sh=sheet();
  const ng=v=>v?' class="ng"':'';
  const fill=n=>{ let s=''; for(let i=0;i<n;i++) s+='<td class="fill"></td>'; return s; };
  // ── 레이아웃: 좌우 가변 패딩 열로 콘텐츠를 가운데로 (프레임 차트 뷰와 동일 로직) ──
  const PTW=112, DW=92, ROWH=21;
  const contentW=PTW+(NC-1)*DW;                              // 표 콘텐츠 폭
  const dv=$('data-view'), vw=dv.clientWidth||1200, vh=dv.clientHeight||600;
  const leftover=Math.max(0, vw-42-contentW);               // 42 = 행번호 열
  let padPer=2; { const per=leftover/(padPer*2); if(per>95) padPer=3; else if(per<40) padPer=1; }
  const padW=Math.max(12, Math.round(leftover/(padPer*2)));
  const totalCols=padPer+NC+padPer;                          // 좌패딩 + 콘텐츠 + 우패딩
  const LP=fill(padPer), RP=fill(padPer);                    // 좌/우 패딩 셀(엷은 회색)
  // 요약 정보 (집계 1회)
  const N=qc.N, P=qc.points.length;
  let sN=0,sU=0,sL=0,ngPts=0,cpkCnt=0,minCpk=Infinity,minCpkPt='',minCp=Infinity,minCpPt='',lowCpk=0,maxNG=-1,maxNGpt='';
  for(const p of qc.points){ const t=p.uNG+p.lNG; sN+=p.n; sU+=p.uNG; sL+=p.lNG; if(t>0)ngPts++;
    if(t>maxNG){ maxNG=t; maxNGpt=ptLabel(p.no); }
    if(p.cpk!=null){ cpkCnt++; if(p.cpk<minCpk){minCpk=p.cpk;minCpkPt=ptLabel(p.no);} if(p.cpk<1.33)lowCpk++; }
    if(p.cp!=null && p.cp<minCp){ minCp=p.cp; minCpPt=ptLabel(p.no); } }
  const totNG=sU+sL, verdict=ngPts?'NG':'OK';
  const defRate=sN>0?(totNG/sN*100):0, dpmo=Math.round(defRate*10000);
  const worstCpk=cpkCnt?minCpk:null, worstCp=(minCp<Infinity)?minCp:null;
  const M=qc.meta||{}, md=k=>M[k]||'-';
  const fpyStr=(qc.fpy==null)?'-':qc.fpy.toFixed(1)+'%';
  // colgroup: 행번호(42) + 좌패딩(padW×padPer) + 포인트(112) + 데이터(92×11) + 우패딩(padW×padPer)
  const widths=[]; for(let i=0;i<padPer;i++) widths.push(padW);
  widths.push(PTW); for(let i=1;i<NC;i++) widths.push(DW);
  for(let i=0;i<padPer;i++) widths.push(padW);
  const cg=xlColgroup(widths, sh);
  // 열 머리글 A,B,C… (패딩 포함)
  let head='<tr><th class="xh corner"></th>';
  for(let c=0;c<totalCols;c++) head+='<th class="xh">'+colName(c)+'</th>';
  head+='</tr>';
  let body='', rn=1;
  const blankRow=()=>{ body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP+fill(NC)+RP+'</tr>'; rn++; };
  const infoRow=pairs=>{ let s=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP;
    for(const pr of pairs) s+='<td class="info-k">'+escH(pr[0])+'</td><td class="info-v'+(pr[2]?' '+pr[2]:'')+'">'+escH(pr[1])+'</td>';
    body+=s+RP+'</tr>'; rn++; };
  blankRow();   // 1행: 상단 여백(빈 행)
  // 메인 타이틀 + 한 줄 설명 (왼쪽 정렬) — 오른쪽 절반(J~O)은 비워 둠(추후 정보 영역)
  const tHalf=Math.ceil(NC/2), tRest=NC-tHalf;
  body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP+'<td class="pg-title" colspan="'+tHalf+'">🎯 불량률 시각화 도구</td><td class="pg-title" colspan="'+tRest+'"></td>'+RP+'</tr>'; rn++;
  body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP+'<td class="pg-sub" colspan="'+tHalf+'">측정 데이터를 정규분포·산점도·박스플롯으로 시각화합니다</td><td class="pg-sub" colspan="'+tRest+'"></td>'+RP+'</tr>'; rn++;
  // 메타데이터
  infoRow([['모델',md('model')],['품번',md('pn')],['Lot',md('lot')],['검사일',md('date')],['측정기',md('jig')],['프로그램',md('program')]]);
  // 요약 ① — 규모·불량·수율
  infoRow([['시료 수',N],['포인트 수',P],['종합 판정',verdict,verdict==='OK'?'ok':'ng'],['총 불량률',defRate.toFixed(2)+'%',totNG>0?'ng':''],['대별 양품률',fpyStr,'ok'],['DPMO',dpmo.toLocaleString()]]);
  // 요약 ② — 공정능력·이탈
  infoRow([['최저 Cpk',worstCpk==null?'-':(minCpkPt+' '+worstCpk.toFixed(2)),(worstCpk!=null&&worstCpk<1.33)?'ng':''],['최저 Cp',worstCp==null?'-':(minCpPt+' '+worstCp.toFixed(2))],['Cpk<1.33',lowCpk+'개'],['NG 포인트',ngPts+'개'],['상하한 이탈',sU+' / '+sL],['최다 불량',maxNGpt?(maxNGpt+' ('+maxNG+')'):'-']]);
  blankRow();   // 공백(구분)
  // 표 헤더
  let hr=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP;
  for(const lb of labels) hr+='<td class="hdr">'+escH(lb)+'</td>';
  body+=hr+RP+'</tr>'; rn++;
  // 불량률 그라디언트(높을수록 진하게): 데이터셋 내 최악 불량률 기준, 최소 5% 스케일
  let maxRate=0;
  for(const p of qc.points){ const nn=p.n||1; maxRate=Math.max(maxRate, p.uNG/nn*100, p.lNG/nn*100, (p.uNG+p.lNG)/nn*100); }
  const rScale=Math.max(maxRate,5);
  const heat=(cnt,n)=>{ if(!cnt||!n) return ''; const a=Math.min(1,0.14+(cnt/n*100/rScale)*0.86); return ' style="background:rgba(208,39,45,'+a.toFixed(3)+');color:'+(a>0.5?'#fff':'#9c1c1c')+';font-weight:600"'; };
  // 포인트 데이터
  for(const p of qc.points){
    const n=p.n,u=p.uNG,l=p.lNG,t=u+l;
    body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+LP
      +'<td class="ptname">'+escH(ptLabel(p.no))+'</td>'
      +'<td>'+f3(p.spec)+'</td><td class="lim-u">'+f3(p.usl)+'</td><td class="lim-l">'+f3(p.lsl)+'</td>'
      +'<td>'+n+'</td><td>'+f3(p.mean)+'</td>'
      +'<td'+heat(u,n)+'>'+u+'</td><td'+heat(l,n)+'>'+l+'</td><td'+heat(t,n)+'>'+t+'</td>'
      +'<td'+heat(u,n)+'>'+pct(u,n)+'</td><td'+heat(l,n)+'>'+pct(l,n)+'</td><td'+heat(t,n)+'>'+pct(t,n)+'</td>'
      +RP+'</tr>'; rn++;
  }
  const sT=sU+sL;
  body+=trTag(rn,sh,'total')+'<th class="rn">'+rn+'</th>'+LP
    +'<td class="ptname">전체</td><td>-</td><td>-</td><td>-</td><td>'+sN+'</td><td>-</td>'
    +'<td>'+sU+'</td><td>'+sL+'</td><td>'+sT+'</td>'
    +'<td>'+pct(sU,sN)+'</td><td>'+pct(sL,sN)+'</td><td>'+pct(sT,sN)+'</td>'
    +RP+'</tr>'; rn++;
  // 더미 행 — 화면 세로 채우기 (좌우 패딩 포함 전체 회색)
  const bodyRows=rn-1, totalRows=Math.max(bodyRows+3, Math.ceil(vh/ROWH)+1);   // +3행: 표 아래 여백
  for(; rn<=totalRows; rn++) body+=trTag(rn,sh)+'<th class="rn">'+rn+'</th>'+fill(totalCols)+'</tr>';
  return '<div class="xl-wrap"><table class="xl-grid"><colgroup>'+cg+'</colgroup><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
}
function renderSampleTable(D){
  const val=(r,c)=>{ const cell=D[r+','+c]; return cell&&cell.v!=null?String(cell.v):''; };
  let P=0; for(let c=1;c<COLS;c++){ const h=D['1,'+c]; if(h&&h.v!==''&&h.v!=null) P=c; else break; }
  if(P===0){ // 비-QC(일반 가져오기): 채워진 최대 열 탐색
    for(let r=0;r<20;r++) for(let c=1;c<COLS;c++){ if(D[r+','+c]&&D[r+','+c].v!=='') P=Math.max(P,c); }
  }
  const showCols=Math.min(P,60), maxRows=30, esc=escH;
  const STOP=/^(검사 수|평균|최소값|최대값|상한 NG|하한 NG|판정)$/;
  const isQC = D['1,0'] && /포인트/.test(String(D['1,0'].v));
  let h='<div class="dv-tablewrap"><table class="dv-table">';
  if(isQC){
    h+='<thead><tr><th>'+esc(val(1,0))+'</th>'; for(let c=1;c<=showCols;c++) h+='<th>'+esc(val(1,c))+'</th>'; h+='</tr></thead><tbody>';
    for(const ri of [2,3,4]){ h+='<tr class="dv-spec"><td>'+esc(val(ri,0))+'</td>'; for(let c=1;c<=showCols;c++) h+='<td>'+esc(val(ri,c))+'</td>'; h+='</tr>'; }
    h+='<tr class="dv-dhdr"><td>'+esc(val(5,0))+'</td>'; for(let c=1;c<=showCols;c++) h+='<td>'+esc(val(5,c))+'</td>'; h+='</tr>';
    let shown=0, total=0;
    for(let r=6;r<ROWS;r++){ const c0=D[r+',0']; if(!c0||c0.v===''||c0.v==null) break; if(STOP.test(String(c0.v))) break; total++;
      if(shown<maxRows){ h+='<tr><td>'+esc(val(r,0))+'</td>'; for(let c=1;c<=showCols;c++) h+='<td>'+esc(val(r,c))+'</td>'; h+='</tr>'; shown++; } }
    h+='</tbody></table></div>';
    h+='<div class="dv-note">전체 '+total+'행 중 처음 '+shown+'행 미리보기'+(showCols<P?(' · 열 '+showCols+'/'+P+' 표시'):'')+'</div>';
  } else {
    h+='<tbody>';
    let shown=0;
    for(let r=0;r<ROWS && shown<maxRows;r++){ let any=false; for(let c=0;c<=showCols;c++) if(val(r,c)!==''){ any=true; break; }
      if(!any) continue;
      h+='<tr>'; for(let c=0;c<=showCols;c++) h+='<td>'+esc(val(r,c))+'</td>'; h+='</tr>'; shown++; }
    h+='</tbody></table></div><div class="dv-note">처음 '+shown+'행 미리보기</div>';
  }
  return h;
}

const WZ_STEPS=[

let wzIdx=0, wzTarget=null, wzPlace='bottom';
function activateTab(name){ const t=document.querySelector('.rtab[data-tab="'+name+'"]'); if(t && !t.classList.contains('active')) t.click(); }
function wzCleanup(){ document.querySelectorAll('.chart-card.wz-reveal').forEach(c=>c.classList.remove('wz-reveal')); clearSelection(); }
function startTutorial(){ $('wz-hint').classList.remove('show'); wzIdx=0; $('wizard').style.display='block'; showWzStep(); }
function endTutorial(){ $('wizard').style.display='none'; wzCleanup(); try{ localStorage.setItem('qc_tut_done','1'); }catch(e){} const h=$('wz-hint'); h.classList.add('show'); setTimeout(()=>h.classList.remove('show'), 4500); }
function showWzStep(){
  wzCleanup();
  const step=WZ_STEPS[wzIdx];
  $('wz-step').textContent=(wzIdx+1)+' / '+WZ_STEPS.length;
  $('wz-title').textContent=step.title;
  $('wz-body').textContent=step.body;
  $('wz-prev').style.visibility=wzIdx===0?'hidden':'visible';
  $('wz-next').textContent=wzIdx===WZ_STEPS.length-1?'마침':'다음';
  wzPlace=step.place;
  $('wz-spot').style.opacity='0';
  $('wz-bubble').style.visibility='hidden';
  step.before(()=>{ wzTarget=step.target(); positionWz(); });
}
function positionWz(){
  const tgt=wzTarget; if(!tgt) return;
  const r=tgt.getBoundingClientRect(), spot=$('wz-spot'), b=$('wz-bubble'), arrow=$('wz-arrow'), pad=6, gap=14;
  spot.style.opacity='1'; b.style.visibility='visible';
  spot.style.left=(r.left-pad)+'px'; spot.style.top=(r.top-pad)+'px';
  spot.style.width=(r.width+pad*2)+'px'; spot.style.height=(r.height+pad*2)+'px';
  const bw=b.offsetWidth, bh=b.offsetHeight, cx=r.left+r.width/2;
  let bx=clamp(cx-bw/2, 10, innerWidth-bw-10), by;
  if(wzPlace==='top'){ by=r.top-bh-gap; arrow.style.cssText='left:'+clamp(cx-bx-7,14,bw-28)+'px;bottom:-7px;top:auto;display:block'; }
  else { by=r.bottom+gap; arrow.style.cssText='left:'+clamp(cx-bx-7,14,bw-28)+'px;top:-7px;bottom:auto;display:block'; }
  by=clamp(by, 8, innerHeight-bh-8);
  b.style.left=bx+'px'; b.style.top=by+'px';
}
$('wz-next').addEventListener('click', ()=>{ if(wzIdx>=WZ_STEPS.length-1) endTutorial(); else { wzIdx++; showWzStep(); } });
$('wz-prev').addEventListener('click', ()=>{ if(wzIdx>0){ wzIdx--; showWzStep(); } });
