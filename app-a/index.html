<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합 문서1 - Excel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23107C41'/%3E%3Ctext x='16' y='23' font-size='20' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3EX%3C/text%3E%3C/svg%3E">
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
:root{
  --green:#107C41; --green-dark:#0E6A38; --green-darker:#0B5A30;
  --ribbon-bg:#f7f7f7; --line:#d8d8d8; --hdr-bg:#f5f5f5;
  --hdr-hl:#CAEAD8; --sel-tint:rgba(16,124,65,.08);
  --grid-line:#e0e0e0;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:"Pretendard Variable","Pretendard","Segoe UI","Malgun Gothic",sans-serif;font-size:12px;
  display:flex;flex-direction:column;background:#fff;color:#222;
  user-select:none;-webkit-user-select:none;
}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select{font-family:inherit}

/* ───────── 타이틀 바 ───────── */
#titlebar{
  height:36px;background:var(--green);color:#fff;display:flex;align-items:center;
  padding:0 6px;flex-shrink:0;gap:4px;
}
#titlebar .tb-btn{
  color:#fff;padding:4px 8px;border-radius:3px;font-size:13px;line-height:1;
}
#titlebar .tb-btn:hover{background:rgba(255,255,255,.15)}
#autosave{
  display:flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 8px;border-radius:3px;color:#fff;
}
#autosave:hover{background:rgba(255,255,255,.15)}
#autosave .pill{
  width:26px;height:14px;border-radius:7px;background:#9db9aa;position:relative;transition:background .15s;
}
#autosave .pill::after{
  content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;
  background:#fff;transition:left .15s;
}
#autosave.on .pill{background:#fff}
#autosave.on .pill::after{left:14px;background:var(--green)}
#tb-title{
  font-size:12px;padding:0 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#tb-search{
  flex:1;max-width:560px;margin:0 auto;height:26px;background:rgba(255,255,255,.9);
  border-radius:4px;display:flex;align-items:center;gap:8px;padding:0 12px;color:#444;
  font-size:12px;cursor:text;min-width:120px;
}
#tb-search:hover{background:#fff}
#tb-right{display:flex;align-items:center;margin-left:auto}
#tb-user{
  width:26px;height:26px;border-radius:50%;background:#F2C811;color:#5c4a00;font-weight:600;
  display:flex;align-items:center;justify-content:center;font-size:11px;margin:0 8px;
}
.win-btn{width:42px;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}
.win-btn:hover{background:rgba(255,255,255,.15)}
.win-btn.close:hover{background:#E81123}

/* ───────── 메뉴(리본 탭) 바 ───────── */
#menubar{
  height:34px;background:#fff;display:flex;align-items:flex-end;padding:0 8px;
  flex-shrink:0;border-bottom:1px solid #e6e6e6;
}
#file-tab{
  background:var(--green);color:#fff;height:28px;padding:0 16px;border-radius:4px 4px 0 0;
  font-size:12.5px;margin-right:4px;align-self:flex-end;
}
#file-tab:hover{background:var(--green-dark)}
.rtab{
  height:30px;padding:0 13px;font-size:12.5px;color:#333;border-radius:4px 4px 0 0;
  position:relative;
}
.rtab:hover{background:#f2f2f2;color:var(--green)}
.rtab.active{color:var(--green);font-weight:600}
.rtab.active::after{
  content:"";position:absolute;left:10px;right:10px;bottom:0;height:2.5px;
  background:var(--green);border-radius:2px 2px 0 0;
}
#menubar-right{margin-left:auto;display:flex;align-items:center;gap:4px;padding-bottom:3px}
#menubar-right .mb-btn{
  display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;font-size:12px;color:#333;
}
#menubar-right .mb-btn:hover{background:#f2f2f2}
#btn-share{background:var(--green);color:#fff !important}
#btn-share:hover{background:var(--green-dark) !important}

/* ───────── 리본 ───────── */
#ribbon{
  background:var(--ribbon-bg);border-bottom:1px solid #d1d1d1;flex-shrink:0;
  height:96px;overflow:hidden;position:relative;
}
.rpanel{display:none;height:100%;padding:2px 6px 0;overflow-x:auto;overflow-y:hidden;white-space:nowrap}
.rpanel.active{display:flex}
.rgroup{
  display:inline-flex;flex-direction:column;padding:2px 4px 0;position:relative;flex-shrink:0;
}
.rgroup::after{
  content:"";position:absolute;right:0;top:6px;bottom:6px;width:1px;background:#dcdcdc;
}
.rgroup-body{flex:1;display:flex;align-items:flex-start;gap:1px;padding-top:2px}
.rgroup-label{
  text-align:center;font-size:10.5px;color:#777;padding:1px 4px 3px;display:flex;
  align-items:center;justify-content:center;gap:4px;
}
.dlg-launch{font-size:8px;color:#999;cursor:pointer;padding:1px 3px;border-radius:2px}
.dlg-launch:hover{background:#e4e4e4;color:#555}
.rbig{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:2px;
  min-width:46px;padding:5px 6px 3px;border-radius:4px;font-size:11px;color:#333;line-height:1.25;
  height:66px;
}
.rbig:hover{background:#e8e8e8}
.rbig .ric{font-size:21px;line-height:1;height:26px;display:flex;align-items:center}
.rbig .arrow{font-size:8px;color:#666}
.rsmall{
  display:flex;align-items:center;gap:5px;height:22px;padding:0 5px;border-radius:3px;
  font-size:11.5px;color:#333;
}
.rsmall:hover{background:#e8e8e8}
.rsmall .ric{font-size:14px;line-height:1;width:16px;text-align:center}
.rcol{display:flex;flex-direction:column;justify-content:flex-start;gap:1px}
.rrow{display:flex;align-items:center;gap:1px}
.ribtn{
  width:24px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:3px;
  font-size:13px;color:#333;
}
.ribtn:hover{background:#e4e4e4}
.ribtn.on{background:#CFE8DC;outline:1px solid #9fcdb6}
.ribtn.wide{width:auto;padding:0 4px}
.ga{font-family:"Malgun Gothic";font-size:13px;font-weight:400}
.colorbar{display:flex;flex-direction:column;align-items:center;line-height:1}
.colorbar .bar{width:14px;height:3px;margin-top:1px;border-radius:1px}
select.rsel{
  height:22px;border:1px solid #c8c8c8;border-radius:3px;background:#fff;font-size:11.5px;
  padding:0 2px;color:#333;outline:none;
}
select.rsel:hover{border-color:var(--green)}
.num-input{
  width:40px;height:22px;border:1px solid #c8c8c8;border-radius:3px;font-size:11.5px;text-align:center;
}
.drop{position:relative}
.palette{
  display:none;position:absolute;top:24px;left:0;background:#fff;border:1px solid #c8c8c8;
  box-shadow:0 4px 10px rgba(0,0,0,.15);padding:8px;z-index:200;border-radius:3px;
}
.palette.open{display:block}
.palette .prow{display:flex;gap:3px;margin-bottom:3px}
.palette .sw{width:16px;height:16px;border:1px solid rgba(0,0,0,.12);cursor:pointer;border-radius:2px}
.palette .sw:hover{outline:2px solid var(--green)}
.palette .pclear{
  display:block;width:100%;text-align:left;font-size:11.5px;padding:4px 6px;border-radius:3px;margin-top:3px;
}
.palette .pclear:hover{background:#eee}

/* ───────── 수식 입력줄 ───────── */
#formulabar{
  height:27px;display:flex;align-items:stretch;border-bottom:1px solid var(--line);
  background:#fff;flex-shrink:0;
}
#namebox{
  width:110px;border:none;border-right:1px solid var(--line);padding:0 8px;font-size:12px;
  outline:none;text-align:left;font-family:"Segoe UI","Malgun Gothic";
}
#fb-btns{display:flex;align-items:center;border-right:1px solid var(--line);padding:0 2px}
#fb-btns button{
  width:22px;height:20px;font-size:11px;color:#888;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
}
#fb-btns button:hover{background:#eee;color:#333}
#fb-btns button:disabled{color:#ccc;pointer-events:none}
#fb-fx{font-style:italic;font-family:Georgia,serif;color:#666 !important;font-size:13px !important}
#formula-input{
  flex:1;border:none;outline:none;padding:0 8px;font-size:12.5px;
  font-family:"Pretendard Variable","Pretendard","Malgun Gothic","Segoe UI";
}

/* ───────── 그리드 ───────── */
#grid-scroll{flex:1;overflow:auto;background:#fff;position:relative;display:none}   /* 측정데이터는 요약 뷰 사용 — 무거운 그리드는 기본 숨김(레이아웃/페인트 방지) */
#grid-wrap{position:relative;display:inline-block;min-width:100%}
#tbl{border-collapse:separate;border-spacing:0;table-layout:fixed}
#tbl th,#tbl td{overflow:hidden;white-space:nowrap;vertical-align:middle}
#tbl th{
  background:var(--hdr-bg);font-weight:400;font-size:11.5px;color:#444;
  position:sticky;z-index:3;
}
#tbl .hdr th{top:0;border-right:1px solid #cfcfcf;border-bottom:1px solid #cfcfcf;height:21px;box-shadow:inset 0 -1px 0 #cfcfcf}
#tbl th.rh{left:0;border-right:1px solid #cfcfcf;border-bottom:1px solid #cfcfcf;text-align:center;z-index:4;box-shadow:inset -1px 0 0 #cfcfcf}
#tbl th#corner{left:0;z-index:6;cursor:cell;box-shadow:inset -1px -1px 0 #cfcfcf}
#corner .tri{
  position:absolute;right:3px;bottom:3px;width:0;height:0;
  border-left:11px solid transparent;border-bottom:11px solid #b5b5b5;
}
#corner:hover .tri{border-bottom-color:var(--green)}
#tbl th.ch{cursor:s-resize}
#tbl th.ch,#tbl th.rh{cursor:cell}
#tbl th.hl{background:var(--hdr-hl);color:var(--green-dark);font-weight:600}
#tbl th.ch.hl{border-bottom:2px solid var(--green);box-shadow:none}
#tbl th.rh.hl{border-right:2px solid var(--green);box-shadow:none}
#tbl th.full{background:var(--green);color:#fff}
#tbl td{
  border-right:1px solid var(--grid-line);border-bottom:1px solid var(--grid-line);
  padding:0 3px;font-family:"Pretendard Variable","Pretendard","Malgun Gothic","Segoe UI";font-size:13.5px;color:#111;
  cursor:cell;background:#fff;background-clip:padding-box;
}
#tbl.nogrid td{border-color:transparent}
#tbl td.sel{background-color:var(--sel-tint)}
#tbl td.num{text-align:right}
#tbl td.ctr{text-align:center}

/* 선택 테두리·채우기 핸들·복사 점선 */
#sel-border{
  position:absolute;border:2px solid var(--green);pointer-events:none;z-index:5;display:none;
}
#sel-border.big-tint{background:var(--sel-tint)}
#fill-handle{
  position:absolute;width:7px;height:7px;background:var(--green);border:1.5px solid #fff;
  z-index:7;cursor:crosshair;display:none;
}
#fill-prev{
  position:absolute;border:1.5px dashed #777;pointer-events:none;z-index:6;display:none;
}
#ants{
  position:absolute;pointer-events:none;z-index:6;display:none;
  background:
    linear-gradient(90deg,var(--green) 55%,#fff 0) repeat-x left top/8px 2px,
    linear-gradient(90deg,var(--green) 55%,#fff 0) repeat-x left bottom/8px 2px,
    linear-gradient(0deg,var(--green) 55%,#fff 0) repeat-y left top/2px 8px,
    linear-gradient(0deg,var(--green) 55%,#fff 0) repeat-y right top/2px 8px;
  animation:march .6s linear infinite;
}
@keyframes march{
  to{background-position:8px top,-8px bottom,left -8px,right 8px}
}
#cell-editor{
  position:absolute;z-index:8;border:none;outline:none;padding:0 3px;
  font-family:"Pretendard Variable","Pretendard","Malgun Gothic","Segoe UI";font-size:13.5px;background:#fff;
  opacity:0;pointer-events:none;min-width:20px;
}
#cell-editor.editing{opacity:1;pointer-events:auto;outline:2px solid var(--green)}

/* ───────── 시트 탭 바 ───────── */
#sheetbar{
  height:26px;background:#f7f7f7;border-top:1px solid #e1e1e1;display:flex;align-items:stretch;
  flex-shrink:0;font-size:12px;
}
#sheet-nav{display:flex;align-items:center;padding:0 4px;gap:2px}
#sheet-nav button{
  width:20px;height:20px;color:#666;font-size:10px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
}
#sheet-nav button:hover{background:#e4e4e4}
#sheet-tabs{display:flex;align-items:stretch}
/* 가로 스크롤바를 시트탭 줄 오른쪽으로 (엑셀식): 뷰의 가로 스크롤을 프록시로 대신 */
#hbar{flex:1;overflow-x:auto;overflow-y:hidden;height:16px;align-self:center;margin:0 2px}
#hbar-sp{height:1px}
.stab{
  display:flex;align-items:center;padding:0 12px;border-right:1px solid #e1e1e1;color:#444;
  cursor:pointer;position:relative;background:transparent;font-size:12px;
}
.stab:first-child{border-left:1px solid #e1e1e1}
.stab:hover{background:#ececec}
.stab.active{
  background:#fff;color:var(--green);font-weight:600;
  box-shadow:inset 0 -2px 0 var(--green);
}
.stab .rn{outline:none;min-width:20px}
/* ───────── 상태 표시줄 ───────── */
#statusbar{
  height:24px;background:var(--ribbon-bg);border-top:1px solid #e1e1e1;display:flex;align-items:center;
  padding:0 8px;flex-shrink:0;font-size:11.5px;color:#555;gap:14px;
}
#sb-stats{margin-left:auto;display:flex;gap:16px;color:#444}
#sb-views{display:flex;gap:2px}
#sb-views button{
  width:24px;height:20px;font-size:11px;color:#666;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
}
#sb-views button:hover{background:#e4e4e4}
#sb-views button.on{background:#d6d6d6}
#sb-updated{display:flex;align-items:center;gap:5px;color:#6a6a6a;cursor:default;white-space:nowrap}
#sb-updated .dot{width:6px;height:6px;border-radius:50%;background:#9aa0a6;flex-shrink:0;transition:background .2s}
#sb-updated .dot.fresh{background:#3aa76d;box-shadow:0 0 0 2px rgba(58,167,109,.18)}
#sb-updated .dot.recent{background:#e0a11b}
#sb-updated .dot.old{background:#9aa0a6}
#zoom-area{display:flex;align-items:center;gap:8px}
#zoom-slider{width:100px;accent-color:#666;height:2px;cursor:pointer}
#zoom-pct{width:38px;text-align:right;cursor:pointer}

/* ───────── 컨텍스트 메뉴 · 토스트 · 백스테이지 ───────── */
#ctxmenu{
  position:fixed;z-index:1000;background:#fff;border:1px solid #ccc;
  box-shadow:0 5px 14px rgba(0,0,0,.2);border-radius:4px;padding:4px 0;display:none;min-width:180px;
}
#ctxmenu .ci{
  display:flex;align-items:center;gap:10px;padding:5px 14px;font-size:12px;color:#222;cursor:default;width:100%;text-align:left;
}
#ctxmenu .ci:hover{background:#f0f0f0}
#ctxmenu .ci .ic{width:16px;text-align:center;font-size:12px}
#ctxmenu hr{border:none;border-top:1px solid #e4e4e4;margin:4px 0}
#toast{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(40,40,40,.92);
  color:#fff;padding:8px 18px;border-radius:5px;font-size:12.5px;z-index:2000;
  opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1}
#backstage{
  position:fixed;inset:0;background:#fff;z-index:1500;display:none;flex-direction:row;
}
#backstage.open{display:flex}
#bs-nav{width:220px;background:var(--green);color:#fff;padding-top:8px;display:flex;flex-direction:column}
#bs-back{
  color:#fff;font-size:18px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:4px;margin:4px 8px 16px;
}
#bs-back:hover{background:rgba(255,255,255,.15)}
.bs-item{
  color:#fff;text-align:left;padding:10px 24px;font-size:13.5px;
}
.bs-item:hover{background:rgba(255,255,255,.12)}
.bs-item.sel{background:rgba(255,255,255,.2)}
#bs-body{flex:1;padding:48px 56px;overflow:auto}
#bs-body h1{font-weight:300;font-size:28px;color:#333;margin-bottom:28px}
.bs-doc{
  display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:6px;cursor:pointer;max-width:640px;
}
.bs-doc:hover{background:#f3f3f3}
.bs-doc .di{width:32px;height:38px;background:var(--green);border-radius:3px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.bs-doc .dn{font-size:13px;color:#222}
.bs-doc .dp{font-size:11px;color:#888}
/* ───────── 측정데이터 요약 뷰 ───────── */
#data-view{
  flex:1;overflow-x:hidden;overflow-y:auto;background:#fff;display:none;padding:0;
  font-family:"Pretendard Variable","Pretendard","Segoe UI","Malgun Gothic",sans-serif;
}
.dv-banner{
  max-width:1600px;margin:0 auto;background:#e5f5e5;border:1px solid #b6e0b6;border-radius:8px;
  padding:12px 16px;font-size:14px;color:#1b6b1b;font-weight:600;
}
.dv-banner b{color:#0a5a0a}
.dv-hint{max-width:1600px;margin:12px auto 0;font-size:12px;color:#777}
.dv-hint b{color:#555}
.dv-tablewrap{
  max-width:1600px;margin:12px auto 0;overflow:auto;border:1px solid #e2e2e0;border-radius:8px;background:#fff;
  max-height:calc(100vh - 320px);
}
table.dv-table{border-collapse:collapse;font-size:11.5px;white-space:nowrap;font-variant-numeric:tabular-nums}
table.dv-table th,table.dv-table td{border:1px solid #ececeb;padding:3px 8px;text-align:center}
table.dv-table thead th{position:sticky;top:0;background:#107C41;color:#fff;font-weight:600;z-index:2}
table.dv-table td:first-child,table.dv-table th:first-child{position:sticky;left:0;background:#f5f5f5;font-weight:600;z-index:1}
table.dv-table thead th:first-child{background:#0b5a30;z-index:3}
table.dv-table tr.dv-spec td{background:#f2f2f2;color:#555}
table.dv-table tr.dv-dhdr td{background:#d9e1f2;font-weight:600;color:#1f3864}
.dv-note{max-width:1600px;margin:8px auto 0;font-size:11.5px;color:#999}
/* 포인트별 요약 — 엑셀 그리드(A·B·C 열머리글 + 1·2·3 행번호) */
.xl-wrap{margin:0;width:max-content}   /* 좌상단에 딱 맞춤 — #data-view가 스크롤 담당 */
table.xl-grid{border-collapse:collapse;table-layout:fixed;font-family:"Pretendard Variable","Pretendard","Malgun Gothic","Segoe UI";font-size:13px;background:#fff}
table.xl-grid tr{height:21px}
table.xl-grid td.fill{background:#f2f0ee;padding:0}   /* 정보 없는 셀(좌우 패딩·빈 칸)은 엷은 회색(#f2f0ee) */
table.xl-grid tr.total td.fill{background:#f2f0ee;font-weight:400}
table.xl-grid th.xh{background:#f5f5f5;border:1px solid #cfcfcf;color:#555;font-weight:400;font-size:11.5px;height:21px;text-align:center;position:sticky;top:0;z-index:2}
table.xl-grid th.corner{position:sticky;left:0;top:0;z-index:4}
table.xl-grid th.rn{background:#f5f5f5;border:1px solid #cfcfcf;color:#555;font-weight:400;font-size:11.5px;text-align:center;position:sticky;left:0;z-index:1}
table.xl-grid td{border:1px solid #e0e0e0;padding:2px 9px;text-align:right;white-space:nowrap;color:#111;background:#fff;overflow:hidden;text-overflow:ellipsis}
table.xl-grid td.hdr{font-weight:600;text-align:center;background:#fafafa;color:#333}
table.xl-grid td.info-title{text-align:left;font-weight:700;color:#0a7a34;background:#eef7f0;font-size:13.5px}
table.xl-grid td.pg-title{text-align:left;font-weight:700;color:#1e1e1e;background:#eef7f0;font-size:34px;letter-spacing:-.02em;padding:14px 14px 2px}
table.xl-grid td.pg-sub{text-align:left;color:#777;background:#eef7f0;font-size:13px;padding:0 14px 12px}
/* ── 메인 페이지(랜딩) 시안 A/B/C — 엑셀 셀 위에 얹은 디자인 ── */
table.xl-grid td.lp-a-hero{position:relative;overflow:hidden;background:#083d21;text-align:center;padding:118px 16px;vertical-align:middle;white-space:normal}
/* 등간격 사각 링이 가운데→바깥으로 연속으로 번지는 애니메이션 (레이더/리플, 음수 딜레이로 항상 6겹) */
/* 계단식 사각 그래디언트 "무한 줌": 등비(1.22) 자기유사 사각 밴드 스택을 wrapper 하나로
   scale(1→1.22³) 확대. 3색 주기와 등비가 맞물려 종료 프레임 = 시작 프레임 → 이음새 자체가 없음.
   transform만 애니메이션(GPU 합성, 리플로우 없음) → 튐 원인 원천 제거. */
table.xl-grid td.lp-a-hero .lp-zoom{position:absolute;left:50%;top:50%;width:100%;height:100%;z-index:0;pointer-events:none;animation:lpZoom 8.3s linear infinite}
table.xl-grid td.lp-a-hero .lp-zoom .zb{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
/* 정적 밝기 오버레이: 가운데 상시 밝음(라디얼) + 가장자리 상시 어두움(셀 모양 사각 비네트).
   움직이는 밴드는 주기 순환색이라 방향성 그래디언트를 못 가짐 → 정적 레이어로 방향성 부여 */
table.xl-grid td.lp-a-hero .lp-a-glow{position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(150,255,190,.34),rgba(150,255,190,0) 74%);box-shadow:inset 0 0 130px 36px rgba(3,34,17,.55)}
table.xl-grid td.lp-a-hero>div{position:relative;z-index:1}
@keyframes lpZoom{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-50%,-50%) scale(3.297304)}}
@media (prefers-reduced-motion:reduce){ table.xl-grid td.lp-a-hero .lp-zoom{animation:none} }
table.xl-grid td.lp-a-step{background:#f6faf7;text-align:center;padding:8px 18px;vertical-align:middle;white-space:normal;border-color:#d7e8dd}

table.xl-grid td.lp-a-hero .lp-a-emoji{font-size:58px;line-height:1;text-shadow:0 0 10px rgba(4,45,23,.22),0 0 22px rgba(4,45,23,.17)}
table.xl-grid td.lp-a-hero .lp-a-title{font-size:57px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-top:10px;text-shadow:0 0 8px rgba(4,45,23,.24),0 0 20px rgba(4,45,23,.2),0 3px 6px rgba(3,30,15,.17)}
table.xl-grid td.lp-a-hero .lp-a-sub{font-size:14.5px;color:rgba(255,255,255,.86);margin-top:10px;text-shadow:0 0 6px rgba(4,45,23,.24),0 0 14px rgba(4,45,23,.2),0 2px 4px rgba(3,30,15,.17)}
table.xl-grid td.lp-a-hero .lp-a-cta{display:inline-block;margin-top:22px;font-size:13px;color:#0b5a30;background:#fff;border:1px solid #fff;border-radius:999px;padding:9px 20px;font-weight:700;box-shadow:0 0 12px rgba(4,45,23,.21),0 0 26px rgba(4,45,23,.15),0 3px 8px rgba(3,30,15,.15)}

<script>
"use strict";
/* ══════════════ 기본 상태 ══════════════ */
const COLS = 64, ROWS = 300, DEFW = 72, DEFH = 22;   // 측정 포인트 최대 60개 지원(라벨 열 + 여유)
const MAX_POINTS = 60;
const $ = id => document.getElementById(id);
const tbl = $('tbl'), wrap = $('grid-wrap'), scroller = $('grid-scroll');
const editor = $('cell-editor'), fInput = $('formula-input'), nameBox = $('namebox');

function newSheet(name){ return { name, data:{}, colW:{}, rowH:{} }; }
let sheets = [], cur = 0;
const sheet = () => sheets[cur];

let sel = {r1:0,c1:0,r2:0,c2:0};   // 선택 범위
let aR = 0, aC = 0;                 // 활성 셀
let editing = false, editMode = null; // 'quick' | 'incell'
let undoStack = [], redoStack = [];
let clip = null;                    // {w,h,cells,cut,tsv}
let showFormulas = false;
let prevFilled = new Set();

function colName(c){ let s=''; c++; while(c>0){ c--; s=String.fromCharCode(65+c%26)+s; c=Math.floor(c/26);} return s; }
function colIndex(s){ let n=0; for(const ch of s.toUpperCase()) n=n*26+(ch.charCodeAt(0)-64); return n-1; }
function refStr(r,c){ return colName(c)+(r+1); }
function key(r,c){ return r+','+c; }
function cloneCell(cell){ return cell ? JSON.parse(JSON.stringify(cell)) : null; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function norm(s){ return { r1:Math.min(s.r1,s.r2), r2:Math.max(s.r1,s.r2), c1:Math.min(s.c1,s.c2), c2:Math.max(s.c1,s.c2) }; }

/* ══════════════ 그리드 생성 ══════════════ */
function buildGrid(){
  let h = '<colgroup><col style="width:46px">';
  for(let c=0;c<COLS;c++) h += '<col style="width:'+DEFW+'px">';
  h += '</colgroup><tr class="hdr"><th id="corner"><span class="tri"></span></th>';
  for(let c=0;c<COLS;c++) h += '<th class="ch" data-c="'+c+'">'+colName(c)+'</th>';
  h += '</tr>';
  for(let r=0;r<ROWS;r++){
    h += '<tr style="height:'+DEFH+'px"><th class="rh" data-r="'+r+'">'+(r+1)+'</th>';
    for(let c=0;c<COLS;c++) h += '<td data-r="'+r+'" data-c="'+c+'"></td>';
    h += '</tr>';
  }
  tbl.innerHTML = h;
}
buildGrid();
const cols = tbl.querySelectorAll('col');
const tdAt = (r,c) => tbl.rows[r+1].cells[c+1];

/* ══════════════ 수식 엔진 ══════════════ */
let cache = {};
function errX(code){ const e = new Error(code); e.xl = code; return e; }

function lex(src){
  const T=[]; let i=0;
  while(i<src.length){
    const ch=src[i];
    if(ch===' '||ch==='\t'){ i++; continue; }
    if(/[0-9]/.test(ch) || (ch==='.' && /[0-9]/.test(src[i+1]||''))){
      let j=i; while(j<src.length && /[0-9.]/.test(src[j])) j++;
      T.push({t:'num', v:parseFloat(src.slice(i,j))}); i=j; continue;
    }
    if(ch==='"'){
      let j=i+1, s='';
      while(j<src.length){
        if(src[j]==='"'){ if(src[j+1]==='"'){ s+='"'; j+=2; } else { j++; break; } }
        else s+=src[j++];
      }
      T.push({t:'str', v:s}); i=j; continue;
    }
    if(/[A-Za-z_$가-힣]/.test(ch)){
      let j=i; while(j<src.length && /[A-Za-z0-9_.$가-힣]/.test(src[j])) j++;
      const w=src.slice(i,j); i=j;
      let k=i; while(src[k]===' ') k++;
      if(src[k]==='(') T.push({t:'fn', v:w.toUpperCase()});
      else if(/^\$?[A-Za-z]{1,3}\$?[0-9]+$/.test(w)) T.push({t:'ref', v:w});
      else if(/^(TRUE|FALSE)$/i.test(w)) T.push({t:'bool', v:/^T/i.test(w)});
      else throw errX('#NAME?');
      continue;
    }
    const two=src.substr(i,2);
    if(two==='<='||two==='>='||two==='<>'){ T.push({t:'op', v:two}); i+=2; continue; }
    if('+-*/^&%(),:;<>='.includes(ch)){ T.push({t:'op', v:ch}); i++; continue; }
    throw errX('#NAME?');
  }
  return T;
}

function refRC(w){
  const m = w.match(/^\$?([A-Za-z]{1,3})\$?([0-9]+)$/);
  const c = colIndex(m[1]), r = parseInt(m[2],10)-1;
  if(r<0||r>=ROWS||c<0||c>=COLS) throw errX('#REF!');
  return [r,c];
}

function toNum(v){
  if(v && v.rng){
    if(v.rng[0]===v.rng[2] && v.rng[1]===v.rng[3]) v = getVal(v.rng[0], v.rng[1], v.vis);
    else throw errX('#VALUE!');
  }
  if(v && v.err) throw errX(v.err);
  if(v==='' || v==null) return 0;
  if(typeof v==='number') return v;
  if(typeof v==='boolean') return v?1:0;
  const n = Number(String(v).replace(/,/g,''));
  if(isNaN(n)) throw errX('#VALUE!');
  return n;
}
function toStr(v){
  if(v && v.rng){
    if(v.rng[0]===v.rng[2] && v.rng[1]===v.rng[3]) v = getVal(v.rng[0], v.rng[1], v.vis);
    else throw errX('#VALUE!');
  }
  if(v && v.err) throw errX(v.err);
  if(v==null || v==='') return '';
  if(typeof v==='boolean') return v?'TRUE':'FALSE';
  return String(v);
}
function scalar(v){
  if(v && v.rng){
    if(v.rng[0]===v.rng[2] && v.rng[1]===v.rng[3]) return getVal(v.rng[0], v.rng[1], v.vis);
    throw errX('#VALUE!');
  }
  return v;
}
function flatVals(args){
  const out=[];
  for(const a of args){
    if(a && a.rng){
      for(let r=a.rng[0]; r<=a.rng[2]; r++)
        for(let c=a.rng[1]; c<=a.rng[3]; c++) out.push(getVal(r,c,a.vis));
    } else out.push(a);
  }
  for(const v of out) if(v && v.err) throw errX(v.err);
  return out;
}
function numsOf(args){ return flatVals(args).filter(v=>typeof v==='number'); }
function truthy(v){
  v = scalar(v);
  if(v && v.err) throw errX(v.err);
  if(typeof v==='boolean') return v;
  if(typeof v==='number') return v!==0;
  if(v===''||v==null) return false;
  if(/^(TRUE|FALSE)$/i.test(v)) return /^T/i.test(v);
  throw errX('#VALUE!');
}
function makeCrit(c){
  c = scalar(c);
  if(typeof c==='string'){
    const m = c.match(/^(>=|<=|<>|>|<|=)(.*)$/);
    if(m){
      const op=m[1]; let rhs=m[2]; const rn=Number(rhs);
      const num = rhs!=='' && !isNaN(rn);
      return v=>{
        if(num && typeof v!=='number'){ const vn=Number(v); if(isNaN(vn)) return op==='<>'; v=vn; }
        if(num){
          switch(op){case '>':return v>rn;case '<':return v<rn;case '>=':return v>=rn;case '<=':return v<=rn;case '=':return v===rn;case '<>':return v!==rn;}
        }
        const a=String(v).toLowerCase(), b=rhs.toLowerCase();
        switch(op){case '=':return a===b;case '<>':return a!==b;case '>':return a>b;case '<':return a<b;case '>=':return a>=b;case '<=':return a<=b;}
      };
    }
    const lc=c.toLowerCase();
    return v => String(v).toLowerCase()===lc;
  }
  return v => v===c || Number(v)===c;
}
function pad2(n){ return String(n).padStart(2,'0'); }

const FN = {
  SUM: a => numsOf(a).reduce((x,y)=>x+y,0),
  AVERAGE: a => { const n=numsOf(a); if(!n.length) throw errX('#DIV/0!'); return n.reduce((x,y)=>x+y,0)/n.length; },
  COUNT: a => numsOf(a).length,
  COUNTA: a => flatVals(a).filter(v=>v!=='' && v!=null).length,
  COUNTBLANK: a => flatVals(a).filter(v=>v===''||v==null).length,
  MAX: a => { const n=numsOf(a); return n.length?Math.max(...n):0; },
  MIN: a => { const n=numsOf(a); return n.length?Math.min(...n):0; },
  IF: a => truthy(a[0]) ? scalar(a.length>1?a[1]:true) : scalar(a.length>2?a[2]:false),
  IFERROR: a => { const v=scalar(a[0]); return (v&&v.err)?scalar(a[1]):v; },
  AND: a => flatVals(a).every(v=>truthy(v)),
  OR: a => flatVals(a).some(v=>truthy(v)),
  NOT: a => !truthy(a[0]),
  ROUND: a => { const m=Math.pow(10,toNum(a[1]||0)); return Math.round(toNum(a[0])*m)/m; },
  ROUNDUP: a => { const m=Math.pow(10,toNum(a[1]||0)); return Math.ceil(Math.abs(toNum(a[0]))*m)/m*Math.sign(toNum(a[0])||1); },
  ROUNDDOWN: a => { const m=Math.pow(10,toNum(a[1]||0)); return Math.trunc(toNum(a[0])*m)/m; },
  ABS: a => Math.abs(toNum(a[0])),
  INT: a => Math.floor(toNum(a[0])),
  MOD: a => { const d=toNum(a[1]); if(d===0) throw errX('#DIV/0!'); return ((toNum(a[0])%d)+d)%d; },
  SQRT: a => { const n=toNum(a[0]); if(n<0) throw errX('#NUM!'); return Math.sqrt(n); },
  POWER: a => Math.pow(toNum(a[0]),toNum(a[1])),
  PI: () => Math.PI,
  RAND: () => Math.random(),
  RANDBETWEEN: a => { const lo=Math.ceil(toNum(a[0])), hi=Math.floor(toNum(a[1])); return lo+Math.floor(Math.random()*(hi-lo+1)); },
  LEN: a => toStr(a[0]).length,
  LEFT: a => toStr(a[0]).slice(0, a.length>1?toNum(a[1]):1),
  RIGHT: a => { const n=a.length>1?toNum(a[1]):1; const s=toStr(a[0]); return n?s.slice(-n):''; },
  MID: a => toStr(a[0]).substr(Math.max(0,toNum(a[1])-1), toNum(a[2])),
  UPPER: a => toStr(a[0]).toUpperCase(),
  LOWER: a => toStr(a[0]).toLowerCase(),
  TRIM: a => toStr(a[0]).trim().replace(/ +/g,' '),
  REPT: a => toStr(a[0]).repeat(Math.max(0,toNum(a[1]))),
  CONCAT: a => flatVals(a).map(v=>toStr(v)).join(''),
  CONCATENATE: a => a.map(v=>toStr(v)).join(''),
  TEXTJOIN: a => { const d=toStr(a[0]); const skip=truthy(a[1]); const vals=flatVals(a.slice(2)).map(v=>toStr(v)); return (skip?vals.filter(v=>v!==''):vals).join(d); },
  TODAY: () => { const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); },
  NOW: () => { const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes()); },
  COUNTIF: a => { const p=makeCrit(a[1]); return flatVals([a[0]]).filter(v=>v!==''&&p(v)).length; },
  SUMIF: a => {
    const p=makeCrit(a[1]);
    if(a.length>2 && a[0].rng && a[2].rng){
      let s=0; const R=a[0].rng, S=a[2].rng;
      for(let r=R[0];r<=R[2];r++) for(let c=R[1];c<=R[3];c++){
        if(p(getVal(r,c,a[0].vis))){ const v=getVal(S[0]+r-R[0], S[1]+c-R[1], a[0].vis); if(typeof v==='number') s+=v; }
      }
      return s;
    }
    return flatVals([a[0]]).filter(v=>typeof v==='number'&&p(v)).reduce((x,y)=>x+y,0);
  },
  AVERAGEIF: a => { const s=FN.SUMIF(a); const p=makeCrit(a[1]); const n=flatVals([a[0]]).filter(v=>v!==''&&p(v)).length; if(!n) throw errX('#DIV/0!'); return s/n; },
  VLOOKUP: a => {
    const target=scalar(a[0]); const R=a[1]&&a[1].rng; const col=toNum(a[2]);
    if(!R) throw errX('#VALUE!');
    if(col<1 || R[1]+col-1>R[3]) throw errX('#REF!');
    const exact = a.length>3 ? !truthy(a[3]) : false;
    let best=null;
    for(let r=R[0];r<=R[2];r++){
      const v=getVal(r,R[1],a[1].vis);
      if(exact){
        if(v===target || String(v).toLowerCase()===String(target).toLowerCase()) return getVal(r,R[1]+col-1,a[1].vis);
      } else {
        if(typeof v==='number'&&typeof target==='number'){ if(v<=target) best=r; else break; }
        else if(String(v).toLowerCase()<=String(target).toLowerCase()) best=r;
      }
    }
    if(!exact && best!=null) return getVal(best,R[1]+col-1,a[1].vis);
    throw errX('#N/A');
  }
};

function evalFormula(src, vis){
  const T = lex(src); let p = 0;
  const peek = () => T[p];
  const isOp = v => T[p] && T[p].t==='op' && T[p].v===v;
  function eat(v){ if(!isOp(v)) throw errX('#VALUE!'); p++; }
  function cmpVals(a,o,b){
    a=scalar(a); b=scalar(b);
    if(a&&a.err) throw errX(a.err); if(b&&b.err) throw errX(b.err);
    if(typeof a==='number' && typeof b==='number'){}
    else if(typeof a==='string' || typeof b==='string'){ a=String(a).toLowerCase(); b=String(b).toLowerCase(); }
    switch(o){
      case '=': return a===b; case '<>': return a!==b;
      case '<': return a<b; case '>': return a>b;
      case '<=': return a<=b; case '>=': return a>=b;
    }
  }
  function expr(){
    let a=catE();
    while(T[p]&&T[p].t==='op'&&['=','<>','<','>','<=','>='].includes(T[p].v)){ const o=T[p++].v; a=cmpVals(a,o,catE()); }
    return a;
  }
  function catE(){ let a=addE(); while(isOp('&')){ p++; a=toStr(a)+toStr(addE()); } return a; }
  function addE(){
    let a=mulE();
    while(isOp('+')||isOp('-')){ const o=T[p++].v; const b=mulE(); a = o==='+'? toNum(a)+toNum(b) : toNum(a)-toNum(b); }
    return a;
  }
  function mulE(){
    let a=unary();
    while(isOp('*')||isOp('/')){
      const o=T[p++].v; const b=unary();
      if(o==='*') a=toNum(a)*toNum(b);
      else { const d=toNum(b); if(d===0) throw errX('#DIV/0!'); a=toNum(a)/d; }
    }
    return a;
  }
  function unary(){
    if(isOp('-')){ p++; return -toNum(unary()); }
    if(isOp('+')){ p++; return toNum(unary()); }
    return powE();
  }
  function powE(){ let a=postE(); if(isOp('^')){ p++; return Math.pow(toNum(a), toNum(unary())); } return a; }
  function postE(){ let a=primary(); while(isOp('%')){ p++; a=toNum(a)/100; } return a; }
  /* 함수 인수: 에러가 나도 {err}로 감싸 전달 (IFERROR 등이 잡을 수 있게) */
  function parseArg(){
    const start=p;
    try{ return expr(); }
    catch(e){
      p=start;
      let depth=0;
      while(p<T.length){
        const t=T[p];
        if(t.t==='op'){
          if(t.v==='(') depth++;
          else if(t.v===')'){ if(depth===0) break; depth--; }
          else if((t.v===','||t.v===';')&&depth===0) break;
        }
        p++;
      }
      return {err:e.xl||'#VALUE!'};
    }
  }
  function primary(){
    const t=T[p];
    if(!t) throw errX('#VALUE!');
    if(t.t==='num'){ p++; return t.v; }
    if(t.t==='str'){ p++; return t.v; }
    if(t.t==='bool'){ p++; return t.v; }
    if(t.t==='ref'){
      p++;
      if(isOp(':') && T[p+1] && T[p+1].t==='ref'){
        const b=T[p+1].v; p+=2;
        const [r1,c1]=refRC(t.v), [r2,c2]=refRC(b);
        return {rng:[Math.min(r1,r2),Math.min(c1,c2),Math.max(r1,r2),Math.max(c1,c2)], vis};
      }
      const [r,c]=refRC(t.v);
      const v=getVal(r,c,vis);
      if(v&&v.err) throw errX(v.err);
      return v;
    }
    if(t.t==='fn'){
      p++; eat('(');
      const args=[];
      if(!isOp(')')){
        args.push(parseArg());
        while(isOp(',')||isOp(';')){ p++; args.push(parseArg()); }
      }
      eat(')');
      const f=FN[t.v];
      if(!f) throw errX('#NAME?');
      return f(args);
    }
    if(t.t==='op'&&t.v==='('){ p++; const v=expr(); eat(')'); return v; }
    throw errX('#VALUE!');
  }
  const v = expr();
  if(p<T.length) throw errX('#VALUE!');
  return scalar(v);
}

/* getVal: 셀의 평가값 (number | string | boolean | '' | {err}) */
function getVal(r,c,vis){
  const k=key(r,c);
  if(k in cache) return cache[k];
  const cell=sheet().data[k];
  if(!cell || cell.v==null || cell.v==='') return '';
  let v=cell.v, out;
  if(typeof v==='string' && v[0]==='='){
    if(vis.has(k)) return {err:'#REF!'};
    vis.add(k);
    try{ out = evalFormula(v.slice(1), vis); }
    catch(e){ out = {err: e.xl || '#NAME?'}; }
    vis.delete(k);
  } else if(typeof v==='string' && v[0]==="'"){
    out = v.slice(1);
  } else if(typeof v==='string' && v.trim()!=='' && !isNaN(Number(v))){
    out = Number(v);
  } else if(/^(TRUE|FALSE)$/i.test(v)){
    out = /^T/i.test(v);
  } else out = v;
  cache[k]=out;
  return out;
}

/* ══════════════ 표시 형식 & 셀 렌더링 ══════════════ */
function fmtNum(n, s){
  const fmt=(s&&s.fmt)||'general';
  let dec = s && s.dec!=null ? s.dec : null;
  const grp=(x,d)=>x.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  if(fmt==='comma') return grp(n, dec==null?0:dec);
  if(fmt==='currency'){ const d=dec==null?0:dec; return (n<0?'-₩':'₩')+grp(Math.abs(n),d); }
  if(fmt==='percent') return grp(n*100, dec==null?0:dec)+'%';
  if(dec!=null) return grp(n,dec);
  return String(Math.round(n*1e10)/1e10);
}

function renderCell(r,c){
  const td=tdAt(r,c);
  const cell=sheet().data[key(r,c)];
  td.classList.remove('num','ctr');
  if(!cell){ td.textContent=''; td.removeAttribute('style'); return; }
  const s=cell.s||{};
  let txt='', kind='text';
  if(cell.v!=null && cell.v!==''){
    if(showFormulas && typeof cell.v==='string' && cell.v[0]==='='){ txt=cell.v; kind='text'; }
    else {
      const v=getVal(r,c,new Set());
      if(v&&v.err){ txt=v.err; kind='ctr'; }
      else if(typeof v==='number'){ txt=fmtNum(v,s); kind='num'; }
      else if(typeof v==='boolean'){ txt=v?'TRUE':'FALSE'; kind='ctr'; }
      else txt=String(v);
    }
  }
  td.textContent=txt;
  if(kind==='num' && !s.al) td.classList.add('num');
  if(kind==='ctr' && !s.al) td.classList.add('ctr');
  let st='';
  if(s.b) st+='font-weight:700;';
  if(s.i) st+='font-style:italic;';
  if(s.u||s.st){ st+='text-decoration:'+(s.u?'underline ':'')+(s.st?'line-through':'')+';'; }
  if(s.ff) st+='font-family:"'+s.ff+'";';
  if(s.fs) st+='font-size:'+s.fs+'pt;';
  if(s.fill) st+='background-color:'+s.fill+';';
  if(s.col) st+='color:'+s.col+';';
  if(s.al) st+='text-align:'+s.al+';';
  if(s.wrap) st+='white-space:normal;word-break:break-all;';
  if(st) td.setAttribute('style',st); else td.removeAttribute('style');
}

function recalc(){
  cache={};
  const now=new Set(Object.keys(sheet().data));
  const all=new Set([...prevFilled,...now]);
  for(const k of all){ const [r,c]=k.split(',').map(Number); renderCell(r,c); }
  prevFilled=now;
  syncFormulaBar();
}

function renderSheetFull(){
  if(sheet().kind==='chart'){ showChartSheet(); return; }
  if(sheet().kind==='data'){ showDataView(); return; }
  $('grid-scroll').style.display='block';   // 실제 편집 그리드일 때만 표시(현재 구성엔 없음)
  $('chart-view').style.display='none';
  $('data-view').style.display='none';
  cache={};
  for(const k of prevFilled){ const [r,c]=k.split(',').map(Number); const td=tdAt(r,c); td.textContent=''; td.removeAttribute('style'); td.classList.remove('num','ctr'); }
  prevFilled=new Set();
  for(let c=0;c<COLS;c++) cols[c+1].style.width=(sheet().colW[c]||DEFW)+'px';
  for(let r=0;r<ROWS;r++) tbl.rows[r+1].style.height=(sheet().rowH[r]||DEFH)+'px';
  recalc();
  renderSel();
  renderAnts();
}

/* ══════════════ 선택 표시 ══════════════ */
let selTds=[], hlHdrs=[];
const selBorder=$('sel-border'), fillHandle=$('fill-handle');

function boxOf(r1,c1,r2,c2){
  const a=tdAt(r1,c1), b=tdAt(r2,c2);
  return { x:a.offsetLeft, y:a.offsetTop, w:b.offsetLeft+b.offsetWidth-a.offsetLeft, h:b.offsetTop+b.offsetHeight-a.offsetTop };
}

function renderSel(){
  if(sheet().kind==='chart'||sheet().kind==='data') return;   // 그리드가 아닌 뷰에선 선택 표시 불필요
  for(const td of selTds) td.classList.remove('sel');
  for(const th of hlHdrs) th.classList.remove('hl','full');
  selTds=[]; hlHdrs=[];
  const n=norm(sel);
  const area=(n.r2-n.r1+1)*(n.c2-n.c1+1);
  if(area<=3000){
    for(let r=n.r1;r<=n.r2;r++) for(let c=n.c1;c<=n.c2;c++){
      if(r===aR&&c===aC) continue;
      const td=tdAt(r,c); td.classList.add('sel'); selTds.push(td);
    }
    selBorder.classList.remove('big-tint');
  } else selBorder.classList.add('big-tint');
  const fullRows=(n.r1===0&&n.r2===ROWS-1), fullCols=(n.c1===0&&n.c2===COLS-1);
  for(let c=n.c1;c<=n.c2;c++){ const th=tbl.rows[0].cells[c+1]; th.classList.add(fullRows?'full':'hl'); hlHdrs.push(th); }
  for(let r=n.r1;r<=n.r2;r++){ const th=tbl.rows[r+1].cells[0]; th.classList.add(fullCols?'full':'hl'); hlHdrs.push(th); }
  const b=boxOf(n.r1,n.c1,n.r2,n.c2);
  selBorder.style.cssText+=';display:block;left:'+(b.x-1)+'px;top:'+(b.y-1)+'px;width:'+(b.w-1)+'px;height:'+(b.h-1)+'px;';
  fillHandle.style.display='block';
  fillHandle.style.left=(b.x+b.w-5)+'px';
  fillHandle.style.top=(b.y+b.h-5)+'px';
  if(!dragSel) nameBox.value=refStr(aR,aC);
  moveEditor();
  updateStats(n);
  syncFormulaBar();
  syncRibbonState();
}

function updateStats(n){
  const el=$('sb-stats');
  let cnt=0,sum=0,ncnt=0;
  const area=(n.r2-n.r1+1)*(n.c2-n.c1+1);
  if(area>1 && area<=20000){
    for(let r=n.r1;r<=n.r2;r++) for(let c=n.c1;c<=n.c2;c++){
      const v=getVal(r,c,new Set());
      if(v!==''&&v!=null){ cnt++; if(typeof v==='number'){ ncnt++; sum+=v; } }
    }
  }
  let h='';
  if(cnt>=2){
    if(ncnt>0) h+='<span>평균: '+fmtNum(sum/ncnt,null)+'</span>';
    h+='<span>개수: '+cnt+'</span>';
    if(ncnt>0) h+='<span>합계: '+fmtNum(sum,null)+'</span>';
  }
  el.innerHTML=h;
}

function setActive(r,c,extend){
  r=clamp(r,0,ROWS-1); c=clamp(c,0,COLS-1);
  if(extend){ sel.r2=r; sel.c2=c; }
  else { aR=r; aC=c; sel={r1:r,c1:c,r2:r,c2:c}; }
  renderSel();
  const target=extend?tdAt(sel.r2,sel.c2):tdAt(aR,aC);
  target.scrollIntoView({block:'nearest',inline:'nearest'});
}

/* ══════════════ 편집기 ══════════════ */
function moveEditor(){
  if(editing) return;
  const td=tdAt(aR,aC);
  editor.style.left=td.offsetLeft+'px';
  editor.style.top=td.offsetTop+'px';
  editor.style.width=td.offsetWidth+'px';
  editor.style.height=td.offsetHeight+'px';
}
function rawOf(r,c){ const cell=sheet().data[key(r,c)]; return cell&&cell.v!=null?String(cell.v):''; }

function startEdit(mode, initText){
  if(editing) return;
  editing=true; editMode=mode;
  const td=tdAt(aR,aC), s=(sheet().data[key(aR,aC)]||{}).s||{};
  editor.style.left=td.offsetLeft+'px';
  editor.style.top=td.offsetTop+'px';
  editor.style.width=Math.max(td.offsetWidth,40)+'px';
  editor.style.height=td.offsetHeight+'px';
  editor.style.fontFamily=s.ff?('"'+s.ff+'"'):'"Pretendard Variable","Pretendard","Malgun Gothic","Segoe UI"';
  editor.style.fontSize=(s.fs||11)+'pt';
  editor.style.fontWeight=s.b?'700':'400';
  editor.style.fontStyle=s.i?'italic':'normal';
  editor.style.textAlign='left';
  editor.classList.add('editing');
  if(initText!=null) editor.value=initText;
  fInput.value=editor.value;
  $('fb-cancel').disabled=false; $('fb-enter').disabled=false;
  $('sb-mode').textContent=mode==='incell'?'편집':'입력';
  growEditor();
  // IME(한글) 조합 중이면 포커스/캐럿을 건드리지 않는다
  if(initText!=null && document.activeElement!==fInput){ editor.focus(); const L=editor.value.length; editor.setSelectionRange(L,L); }
}
function growEditor(){
  const td=tdAt(aR,aC);
  editor.style.width='auto';
  const w=Math.max(td.offsetWidth, editor.scrollWidth+10);
  editor.style.width=Math.min(w, wrap.clientWidth-td.offsetLeft-2)+'px';
}
function commitEdit(){
  if(!editing) return;
  const val=editor.value;
  editing=false; editMode=null;
  editor.classList.remove('editing'); editor.value='';
  $('fb-cancel').disabled=true; $('fb-enter').disabled=true;
  $('sb-mode').textContent='준비';
  setCellValue(aR,aC,val);
  moveEditor();
}
function cancelEdit(){
  if(!editing) return;
  editing=false; editMode=null;
  editor.classList.remove('editing'); editor.value='';
  $('fb-cancel').disabled=true; $('fb-enter').disabled=true;
  $('sb-mode').textContent='준비';
  syncFormulaBar(); moveEditor(); focusGrid();
}
function isChartSheet(){ return sheet().kind==='chart'; }
function isGridSheet(){ const k=sheet().kind; return k!=='chart' && k!=='data'; }   // 실제 편집 그리드인지
function focusGrid(){ if(!isGridSheet()) return; if(!editing){ editor.value=''; } editor.focus({preventScroll:true}); }

function syncFormulaBar(){
  if(editing) return;
  fInput.value=rawOf(aR,aC);
}

/* ══════════════ 변경 기록 (실행 취소) ══════════════ */
function record(chs,r,c){ chs.push({sh:cur, r, c, b:cloneCell(sheet().data[key(r,c)])}); }
function finish(chs){
  for(const ch of chs) ch.a=cloneCell(sheets[ch.sh].data[key(ch.r,ch.c)]);
  chs=chs.filter(ch=>JSON.stringify(ch.b)!==JSON.stringify(ch.a));
  if(chs.length){ undoStack.push(chs); if(undoStack.length>100) undoStack.shift(); redoStack=[]; }
  recalc();
}
function applyChanges(chs, useBefore){
  const sh=chs[0].sh;
  if(sh!==cur) switchSheet(sh);
  for(const ch of chs){
    const cell=useBefore?ch.b:ch.a;
    if(cell) sheets[ch.sh].data[key(ch.r,ch.c)]=cloneCell(cell);
    else delete sheets[ch.sh].data[key(ch.r,ch.c)];
  }
  recalc(); renderSel();
}
function doUndo(){ if(editing) return; const chs=undoStack.pop(); if(!chs){toast('실행 취소할 작업이 없습니다');return;} redoStack.push(chs); applyChanges(chs,true); }
function doRedo(){ if(editing) return; const chs=redoStack.pop(); if(!chs){toast('다시 실행할 작업이 없습니다');return;} undoStack.push(chs); applyChanges(chs,false); }

function setCellValue(r,c,val){
  const chs=[]; record(chs,r,c);
  const k=key(r,c);
  if(val===''){
    const cell=sheet().data[k];
    if(cell){ if(cell.s&&Object.keys(cell.s).length) delete cell.v; else delete sheet().data[k]; }
  } else {
    const cell=sheet().data[k]||(sheet().data[k]={});
    cell.v=val;
  }
  finish(chs);
}
function clearRange(contentsOnly){
  const n=norm(sel), chs=[];
  for(let r=n.r1;r<=n.r2;r++) for(let c=n.c1;c<=n.c2;c++){
    const k=key(r,c);
    if(!sheet().data[k]) continue;
    record(chs,r,c);
    if(contentsOnly){
      const cell=sheet().data[k];
      delete cell.v;
      if(!cell.s||!Object.keys(cell.s).length) delete sheet().data[k];
    } else delete sheet().data[k];
  }
  finish(chs);
}
function applyStyle(mut){
  const n=norm(sel), chs=[];
  for(let r=n.r1;r<=n.r2;r++) for(let c=n.c1;c<=n.c2;c++){
    record(chs,r,c);
    const k=key(r,c);
    const cell=sheet().data[k]||(sheet().data[k]={});
    cell.s=cell.s||{};
    mut(cell.s, r, c);
    if((cell.v==null||cell.v==='') && !Object.keys(cell.s).length) delete sheet().data[k];
  }
  finish(chs);
  renderSel(); focusGrid();
}
function activeStyle(){ const cell=sheet().data[key(aR,aC)]; return (cell&&cell.s)||{}; }
function syncRibbonState(){
  const s=activeStyle();
  $('rb-bold').classList.toggle('on',!!s.b);
  $('rb-italic').classList.toggle('on',!!s.i);
  $('rb-under').classList.toggle('on',!!s.u);
  $('rb-strike').classList.toggle('on',!!s.st);
  $('rb-wrap').classList.toggle('on',!!s.wrap);
  $('rb-left').classList.toggle('on',s.al==='left');
  $('rb-center').classList.toggle('on',s.al==='center');
  $('rb-right').classList.toggle('on',s.al==='right');
  $('rb-font').value=s.ff||'Pretendard';
  const szEl=$('rb-size'); szEl.value=String(s.fs||11);
  $('rb-numfmt').value=s.fmt||'general';
}

/* ══════════════ 마우스 ══════════════ */
let dragSel=false, dragHdr=null, resizing=null, filling=false, fillTarget=null;

tbl.addEventListener('mousedown', e=>{
  if(e.button===2){ // 우클릭: 선택 범위 밖이면 그 셀 선택
    const td=e.target.closest('td');
    if(td){
      const r=+td.dataset.r, c=+td.dataset.c, n=norm(sel);
      if(r<n.r1||r>n.r2||c<n.c1||c>n.c2){ if(editing)commitEdit(); setActive(r,c,false); }
    }
    return;
  }
  const th=e.target.closest('th');
  if(th){
    e.preventDefault();
    if(editing) commitEdit();
    if(th.id==='corner'){ aR=0;aC=0; sel={r1:0,c1:0,r2:ROWS-1,c2:COLS-1}; renderSel(); focusGrid(); return; }
    if(th.classList.contains('ch')){
      const c=+th.dataset.c;
      if(e.offsetX>th.clientWidth-5){ resizing={type:'col',idx:c,start:e.clientX,orig:cols[c+1].offsetWidth}; return; }
      aR=0; aC=c;
      if(e.shiftKey){ sel.r1=0;sel.r2=ROWS-1;sel.c2=c; } else sel={r1:0,c1:c,r2:ROWS-1,c2:c};
      dragHdr='col'; renderSel(); focusGrid(); return;
    }
    if(th.classList.contains('rh')){
      const r=+th.dataset.r;
      if(e.offsetY>th.clientHeight-4){ resizing={type:'row',idx:r,start:e.clientY,orig:tbl.rows[r+1].offsetHeight}; return; }
      aR=r; aC=0;
      if(e.shiftKey){ sel.c1=0;sel.c2=COLS-1;sel.r2=r; } else sel={r1:r,c1:0,r2:r,c2:COLS-1};
      dragHdr='row'; renderSel(); focusGrid(); return;
    }
    return;
  }
  const td=e.target.closest('td');
  if(!td) return;
  e.preventDefault();
  const r=+td.dataset.r, c=+td.dataset.c;
  if(editing){
    if(r===aR&&c===aC) return;
    commitEdit();
  }
  if(e.shiftKey){ sel.r2=r; sel.c2=c; renderSel(); }
  else { aR=r; aC=c; sel={r1:r,c1:c,r2:r,c2:c}; dragSel=true; renderSel(); }
  focusGrid();
});

tbl.addEventListener('dblclick', e=>{
  const td=e.target.closest('td');
  if(td) startEdit('incell', rawOf(aR,aC));
});

tbl.addEventListener('mousemove', e=>{
  const th=e.target.closest('th');
  if(!resizing && th){
    if(th.classList.contains('ch')) th.style.cursor = e.offsetX>th.clientWidth-5 ? 'col-resize' : 'cell';
    else if(th.classList.contains('rh')) th.style.cursor = e.offsetY>th.clientHeight-4 ? 'row-resize' : 'cell';
  }
});

document.addEventListener('mousemove', e=>{
  if(resizing){
    if(resizing.type==='col'){
      const w=Math.max(18, resizing.orig+e.clientX-resizing.start);
      sheet().colW[resizing.idx]=w; cols[resizing.idx+1].style.width=w+'px';
    } else {
      const h=Math.max(14, resizing.orig+e.clientY-resizing.start);
      sheet().rowH[resizing.idx]=h; tbl.rows[resizing.idx+1].style.height=h+'px';
    }
    renderSel(); renderAnts();
    return;
  }
  if(filling){
    const td=document.elementFromPoint(e.clientX,e.clientY);
    const cell=td&&td.closest?td.closest('td'):null;
    if(cell){
      const r=+cell.dataset.r, c=+cell.dataset.c, n=norm(sel);
      const dv=r>n.r2?r-n.r2:(r<n.r1?r-n.r1:0);
      const dh=c>n.c2?c-n.c2:(c<n.c1?c-n.c1:0);
      const fp=$('fill-prev');
      if(Math.abs(dv)>=Math.abs(dh)&&dv!==0){
        fillTarget={dir:dv>0?'down':'up', to:r};
        const b=dv>0?boxOf(n.r1,n.c1,r,n.c2):boxOf(r,n.c1,n.r2,n.c2);
        fp.style.cssText='display:block;left:'+(b.x-1)+'px;top:'+(b.y-1)+'px;width:'+(b.w-2)+'px;height:'+(b.h-2)+'px;';
      } else if(dh!==0){
        fillTarget={dir:dh>0?'right':'left', to:c};
        const b=dh>0?boxOf(n.r1,n.c1,n.r2,c):boxOf(n.r1,c,n.r2,n.c2);
        fp.style.cssText='display:block;left:'+(b.x-1)+'px;top:'+(b.y-1)+'px;width:'+(b.w-2)+'px;height:'+(b.h-2)+'px;';
      } else { fillTarget=null; fp.style.display='none'; }
    }
    return;
  }
  if(dragSel){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const td=el&&el.closest?el.closest('td'):null;
    if(td&&td.dataset.r!=null){ sel.r2=+td.dataset.r; sel.c2=+td.dataset.c; renderSel(); nameBoxDragInfo(); }
  }
  if(dragHdr){
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const th=el&&el.closest?el.closest('th'):null;
    if(th){
      if(dragHdr==='col'&&th.classList.contains('ch')){ sel.c2=+th.dataset.c; renderSel(); }
      if(dragHdr==='row'&&th.classList.contains('rh')){ sel.r2=+th.dataset.r; renderSel(); }
    }
  }
});

function nameBoxDragInfo(){
  const n=norm(sel);
  if(n.r1!==n.r2||n.c1!==n.c2) nameBox.value=(n.r2-n.r1+1)+'R x '+(n.c2-n.c1+1)+'C';
}

document.addEventListener('mouseup', ()=>{
  if(resizing){ resizing=null; return; }
  if(filling){
    $('fill-prev').style.display='none';
    if(fillTarget) doFill(fillTarget);
    filling=false; fillTarget=null; focusGrid();
    return;
  }
  if(dragSel||dragHdr){ dragSel=false; dragHdr=null; nameBox.value=refStr(aR,aC); }
});

fillHandle.addEventListener('mousedown', e=>{
  e.preventDefault(); e.stopPropagation();
  if(editing) commitEdit();
  filling=true; fillTarget=null;
});

/* ══════════════ 키보드 ══════════════ */
function ctrlJump(r,c,dr,dc){
  const has=(r,c)=>{ const v=sheet().data[key(r,c)]; return v&&v.v!=null&&v.v!==''; };
  let nr=r+dr, nc=c+dc;
  if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return [r,c];
  if(has(r,c)&&has(nr,nc)){
    while(nr+dr>=0&&nr+dr<ROWS&&nc+dc>=0&&nc+dc<COLS&&has(nr+dr,nc+dc)){ nr+=dr; nc+=dc; }
    return [nr,nc];
  }
  while(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!has(nr,nc)){
    if(nr+dr<0||nr+dr>=ROWS||nc+dc<0||nc+dc>=COLS) return [nr,nc];
    nr+=dr; nc+=dc;
  }
  return [clamp(nr,0,ROWS-1),clamp(nc,0,COLS-1)];
}

editor.addEventListener('keydown', e=>{
  const k=e.key;
  if(editing){
    if(k==='Enter'){ e.preventDefault(); commitEdit(); setActive(aR+(e.shiftKey?-1:1),aC,false); focusGrid(); return; }
    if(k==='Tab'){ e.preventDefault(); commitEdit(); setActive(aR,aC+(e.shiftKey?-1:1),false); focusGrid(); return; }
    if(k==='Escape'){ e.preventDefault(); cancelEdit(); return; }
    if(editMode==='quick'&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)){
      e.preventDefault(); commitEdit();
      const d={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]}[k];
      setActive(aR+d[0],aC+d[1],false); focusGrid(); return;
    }
    return; // 나머지는 기본 입력 동작
  }
  // ── 탐색 모드 ──
  const ctrl=e.ctrlKey||e.metaKey;
  if(ctrl){
    const lk=k.toLowerCase();
    if(lk==='c'){ doCopy(null); return; }               // 빈 입력창에선 copy 이벤트가 안 뜰 수 있어 직접 처리
    if(lk==='x'){ doCut(null); return; }
    if(lk==='v') return;                                 // paste 이벤트에 위임
    if(lk==='z'){ e.preventDefault(); doUndo(); return; }
    if(lk==='y'){ e.preventDefault(); doRedo(); return; }
    if(lk==='b'){ e.preventDefault(); toggleStyle('b'); return; }
    if(lk==='i'){ e.preventDefault(); toggleStyle('i'); return; }
    if(lk==='u'){ e.preventDefault(); toggleStyle('u'); return; }
    if(lk==='a'){ e.preventDefault(); aR=0;aC=0; sel={r1:0,c1:0,r2:ROWS-1,c2:COLS-1}; renderSel(); return; }
    if(lk==='s'){ e.preventDefault(); toast('💾 저장됨 (데모 — 실제 파일은 저장되지 않아요)'); return; }
    if(k==='Home'){ e.preventDefault(); setActive(0,0,false); return; }
    if(k.startsWith('Arrow')){
      e.preventDefault();
      const d={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]}[k];
      const [nr,nc]=ctrlJump(e.shiftKey?sel.r2:aR, e.shiftKey?sel.c2:aC, d[0], d[1]);
      setActive(nr,nc,e.shiftKey); return;
    }
    return;
  }
  if(k.startsWith('Arrow')){
    e.preventDefault();
    const d={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]}[k];
    if(e.shiftKey) setActive(sel.r2+d[0], sel.c2+d[1], true);
    else setActive(aR+d[0], aC+d[1], false);
    return;
  }
  if(k==='Enter'){ e.preventDefault(); setActive(aR+(e.shiftKey?-1:1),aC,false); return; }
  if(k==='Tab'){ e.preventDefault(); setActive(aR,aC+(e.shiftKey?-1:1),false); return; }
  if(k==='Home'){ e.preventDefault(); setActive(aR,0,false); return; }
  if(k==='PageDown'){ e.preventDefault(); setActive(aR+20,aC,e.shiftKey); return; }
  if(k==='PageUp'){ e.preventDefault(); setActive(aR-20,aC,e.shiftKey); return; }
  if(k==='Delete'||k==='Backspace'){ e.preventDefault(); clearRange(true); return; }
  if(k==='F2'){ e.preventDefault(); startEdit('incell', rawOf(aR,aC)); return; }
  if(k==='Escape'){ e.preventDefault(); clip=null; renderAnts(); return; }
});

editor.addEventListener('input', ()=>{
  if(!editing){
    if(editor.value==='') return;
    startEdit('quick', null); // 이미 입력된 글자(IME 포함)를 유지
  }
  fInput.value=editor.value;
  growEditor();
});
editor.addEventListener('blur', ()=>{
  setTimeout(()=>{
    if(!editing) return;
    const ae=document.activeElement;
    if(ae===fInput||ae===editor) return;
    commitEdit();
  },0);
});

/* ══════════════ 클립보드 ══════════════ */
function toTSV(cells){
  return cells.map(row=>row.map(cell=>{
    if(!cell||cell.v==null) return '';
    return String(cell.disp!=null?cell.disp:cell.v);
  }).join('\t')).join('\n');
}
function snapshotSel(){
  const n=norm(sel);
  const cells=[];
  for(let r=n.r1;r<=n.r2;r++){
    const row=[];
    for(let c=n.c1;c<=n.c2;c++){
      const cell=cloneCell(sheet().data[key(r,c)]);
      if(cell){
        const v=getVal(r,c,new Set());
        cell.disp=(v&&v.err)?v.err:(typeof v==='number'?fmtNum(v,cell.s):(v===true?'TRUE':v===false?'FALSE':String(v)));
      }
      row.push(cell);
    }
    cells.push(row);
  }
  return {w:n.c2-n.c1+1, h:n.r2-n.r1+1, cells, srcR:n.r1, srcC:n.c1, cut:false, tsv:toTSV(cells)};
}
function doCopy(e){
  clip=snapshotSel();
  if(e&&e.clipboardData){ e.clipboardData.setData('text/plain', clip.tsv); e.preventDefault(); }
  else if(navigator.clipboard) navigator.clipboard.writeText(clip.tsv).catch(()=>{});
  renderAnts();
}
function doCut(e){
  doCopy(e);
  clip.cut=true;
  renderAnts();
}
function renderAnts(){
  const a=$('ants');
  if(!clip){ a.style.display='none'; return; }
  const b=boxOf(clip.srcR, clip.srcC, clamp(clip.srcR+clip.h-1,0,ROWS-1), clamp(clip.srcC+clip.w-1,0,COLS-1));
  a.style.cssText+=';display:block;left:'+(b.x-1)+'px;top:'+(b.y-1)+'px;width:'+(b.w)+'px;height:'+(b.h)+'px;';
}
function translateFormula(f,dr,dc){
  return f.replace(/(\$?)([A-Za-z]{1,3})(\$?)([0-9]{1,7})(?![A-Za-z0-9_(])/g,(m,d1,cl,d2,rw,off,str)=>{
    const prev=str[off-1];
    if(prev&&/[A-Za-z0-9_$가-힣]/.test(prev)) return m;
    let c=colIndex(cl), r=parseInt(rw,10)-1;
    if(!d1) c+=dc;
    if(!d2) r+=dr;
    if(c<0||r<0||c>=COLS||r>=ROWS) return '#REF!';
    return d1+colName(c)+d2+(r+1);
  });
}
function pasteInternal(){
  if(!clip) return;
  const n=norm(sel), chs=[];
  if(clip.cut){
    for(let r=0;r<clip.h;r++) for(let c=0;c<clip.w;c++){
      record(chs,clip.srcR+r,clip.srcC+c);
      delete sheet().data[key(clip.srcR+r,clip.srcC+c)];
    }
  }
  // 붙여넣기 영역: 선택이 원본의 정수배면 반복
  let reps_r=1, reps_c=1;
  const selH=n.r2-n.r1+1, selW=n.c2-n.c1+1;
  if(selH>1&&selH%clip.h===0) reps_r=selH/clip.h;
  if(selW>1&&selW%clip.w===0) reps_c=selW/clip.w;
  for(let br=0;br<reps_r;br++) for(let bc=0;bc<reps_c;bc++){
    for(let r=0;r<clip.h;r++) for(let c=0;c<clip.w;c++){
      const tr=n.r1+br*clip.h+r, tc=n.c1+bc*clip.w+c;
      if(tr>=ROWS||tc>=COLS) continue;
      record(chs,tr,tc);
      const src=clip.cells[r][c];
      if(!src){ delete sheet().data[key(tr,tc)]; continue; }
      const cell=cloneCell(src); delete cell.disp;
      if(typeof cell.v==='string'&&cell.v[0]==='=') cell.v=translateFormula(cell.v, tr-(clip.srcR+r), tc-(clip.srcC+c));
      sheet().data[key(tr,tc)]=cell;
    }
  }
  finish(chs);
  sel={r1:n.r1,c1:n.c1,r2:clamp(n.r1+clip.h*reps_r-1,0,ROWS-1),c2:clamp(n.c1+clip.w*reps_c-1,0,COLS-1)};
  aR=n.r1; aC=n.c1;
  if(clip.cut){ clip=null; }
  renderAnts(); renderSel();
}
function pasteText(text){
  const rows=text.replace(/\r/g,'').replace(/\n$/,'').split('\n').map(l=>l.split('\t'));
  const n=norm(sel), chs=[];
  for(let r=0;r<rows.length;r++) for(let c=0;c<rows[r].length;c++){
    const tr=n.r1+r, tc=n.c1+c;
    if(tr>=ROWS||tc>=COLS) continue;
    record(chs,tr,tc);
    const v=rows[r][c];
    if(v===''){ const cell=sheet().data[key(tr,tc)]; if(cell) delete cell.v; }
    else { const cell=sheet().data[key(tr,tc)]||(sheet().data[key(tr,tc)]={}); cell.v=v; }
  }
  finish(chs);
  sel={r1:n.r1,c1:n.c1,r2:clamp(n.r1+rows.length-1,0,ROWS-1),c2:clamp(n.c1+Math.max(...rows.map(r=>r.length))-1,0,COLS-1)};
  aR=n.r1; aC=n.c1; renderSel();
}
document.addEventListener('copy', e=>{ if(!editing&&document.activeElement===editor) doCopy(e); });
document.addEventListener('cut', e=>{ if(!editing&&document.activeElement===editor) doCut(e); });
document.addEventListener('paste', e=>{
  if(editing||document.activeElement!==editor) return;
  e.preventDefault();
  const text=e.clipboardData?e.clipboardData.getData('text/plain'):'';
  if(clip&&(text===''||text===clip.tsv||text.replace(/\r/g,'')===clip.tsv)) pasteInternal();
  else if(text) pasteText(text);
  else if(clip) pasteInternal();
});

/* ══════════════ 채우기 핸들 실행 ══════════════ */
function doFill(t){
  const n=norm(sel), chs=[];
  const vertical=t.dir==='down'||t.dir==='up';
  const lines=vertical?(n.c2-n.c1+1):(n.r2-n.r1+1);
  for(let L=0;L<lines;L++){
    const src=[];
    const len=vertical?(n.r2-n.r1+1):(n.c2-n.c1+1);
    for(let i=0;i<len;i++){
      const r=vertical?n.r1+i:n.r1+L, c=vertical?n.c1+L:n.c1+i;
      src.push({r,c,cell:cloneCell(sheet().data[key(r,c)])});
    }
    const ordered=(t.dir==='up'||t.dir==='left')?[...src].reverse():src;
    const vals=ordered.map(s=>{
      if(!s.cell||s.cell.v==null||s.cell.v==='') return null;
      const num=Number(s.cell.v);
      return (typeof s.cell.v==='string'&&s.cell.v[0]==='=')?'formula':(isNaN(num)?'text':num);
    });
    const allNum=vals.length>=2&&vals.every(v=>typeof v==='number');
    const step=allNum?(vals[vals.length-1]-vals[0])/(vals.length-1):0;
    const count=vertical?Math.abs(t.to-(t.dir==='down'?n.r2:n.r1)):Math.abs(t.to-(t.dir==='right'?n.c2:n.c1));
    for(let i=0;i<count;i++){
      let tr,tc;
      if(t.dir==='down'){ tr=n.r2+1+i; tc=n.c1+L; }
      else if(t.dir==='up'){ tr=n.r1-1-i; tc=n.c1+L; }
      else if(t.dir==='right'){ tr=n.r1+L; tc=n.c2+1+i; }
      else { tr=n.r1+L; tc=n.c1-1-i; }
      if(tr<0||tr>=ROWS||tc<0||tc>=COLS) continue;
      record(chs,tr,tc);
      const srcIdx=i%ordered.length;
      const s=ordered[srcIdx];
      if(!s.cell){ delete sheet().data[key(tr,tc)]; continue; }
      const cell=cloneCell(s.cell);
      if(allNum) cell.v=String(vals[vals.length-1]+step*(i+1));
      else if(typeof cell.v==='string'&&cell.v[0]==='=') cell.v=translateFormula(cell.v, tr-s.r, tc-s.c);
      sheet().data[key(tr,tc)]=cell;
    }
  }
  finish(chs);
  if(t.dir==='down') sel.r2=t.to; else if(t.dir==='up') sel.r1=t.to;
  else if(t.dir==='right') sel.c2=t.to; else sel.c1=t.to;
  const nn=norm(sel); sel={...nn}; aR=nn.r1; aC=nn.c1;
  renderSel();
}

/* ══════════════ 수식 입력줄 · 이름 상자 ══════════════ */
fInput.addEventListener('focus', ()=>{ if(!editing) startEdit('quick', rawOf(aR,aC)); });
fInput.addEventListener('input', ()=>{ if(editing){ editor.value=fInput.value; growEditor(); } });
fInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); if(editing){ editor.value=fInput.value; commitEdit(); setActive(aR+1,aC,false); } focusGrid(); }
  if(e.key==='Escape'){ e.preventDefault(); cancelEdit(); }
  if(e.key==='Tab'){ e.preventDefault(); if(editing){ editor.value=fInput.value; commitEdit(); setActive(aR,aC+1,false); } focusGrid(); }
});
$('fb-enter').addEventListener('mousedown', e=>{ e.preventDefault(); if(editing){ if(document.activeElement===fInput) editor.value=fInput.value; commitEdit(); focusGrid(); } });
$('fb-cancel').addEventListener('mousedown', e=>{ e.preventDefault(); cancelEdit(); });
nameBox.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const m=nameBox.value.trim().match(/^\$?([A-Za-z]{1,3})\$?([0-9]+)$/);
    if(m){
      const c=colIndex(m[1]), r=parseInt(m[2],10)-1;
      if(r>=0&&r<ROWS&&c>=0&&c<COLS){ setActive(r,c,false); focusGrid(); return; }
    }
    nameBox.value=refStr(aR,aC); focusGrid();
  }
  if(e.key==='Escape'){ nameBox.value=refStr(aR,aC); focusGrid(); }
});

/* ══════════════ 리본 동작 ══════════════ */
function toggleStyle(prop){
  const cur=!!activeStyle()[prop];
  applyStyle(s=>{ if(cur) delete s[prop]; else s[prop]=true; });
}
$('rb-bold').onclick=()=>toggleStyle('b');
$('rb-italic').onclick=()=>toggleStyle('i');
$('rb-under').onclick=()=>toggleStyle('u');
$('rb-strike').onclick=()=>toggleStyle('st');
$('rb-wrap').onclick=()=>toggleStyle('wrap');
$('rb-left').onclick=()=>applyStyle(s=>{ if(s.al==='left') delete s.al; else s.al='left'; });
$('rb-center').onclick=()=>applyStyle(s=>{ if(s.al==='center') delete s.al; else s.al='center'; });
$('rb-right').onclick=()=>applyStyle(s=>{ if(s.al==='right') delete s.al; else s.al='right'; });
$('rb-font').onchange=e=>applyStyle(s=>{ if(e.target.value==='Pretendard') delete s.ff; else s.ff=e.target.value; });
$('rb-size').onchange=e=>applyStyle(s=>{ const v=+e.target.value; if(v===11) delete s.fs; else s.fs=v; });
$('rb-sizeup').onclick=()=>applyStyle(s=>{ s.fs=Math.min(72,(s.fs||11)+2); });
$('rb-sizedn').onclick=()=>applyStyle(s=>{ s.fs=Math.max(6,(s.fs||11)-2); if(s.fs===11) delete s.fs; });

$('rb-autosum').onclick=()=>{
  const has=(r,c)=>{ const v=getVal(r,c,new Set()); return typeof v==='number'; };
  let r1=aR-1;
  while(r1>=0&&has(r1,aC)) r1--;
  r1++;
  if(r1<aR){ startEdit('quick','=SUM('+refStr(r1,aC)+':'+refStr(aR-1,aC)+')'); return; }
  let c1=aC-1;
  while(c1>=0&&has(aR,c1)) c1--;
  c1++;
  if(c1<aC){ startEdit('quick','=SUM('+refStr(aR,c1)+':'+refStr(aR,aC-1)+')'); return; }
  toast('합계를 구할 인접한 숫자가 없습니다');
};
let sortAsc=true;
function doSort(asc){
  const n=norm(sel);
  if(n.r1===n.r2){ toast('두 행 이상 선택한 뒤 정렬하세요'); return; }
  const chs=[];
  const rows=[];
  for(let r=n.r1;r<=n.r2;r++){
    const row=[]; let empty=true;
    for(let c=n.c1;c<=n.c2;c++){ const cell=cloneCell(sheet().data[key(r,c)]); if(cell&&cell.v!=null&&cell.v!=='') empty=false; row.push(cell); }
    rows.push({row,empty,sortKey:getVal(r,n.c1,new Set())});
  }
  const filled=rows.filter(r=>!r.empty), blanks=rows.filter(r=>r.empty);
  filled.sort((a,b)=>{
    const x=a.sortKey, y=b.sortKey;
    const nx=typeof x==='number', ny=typeof y==='number';
    let cmp;
    if(nx&&ny) cmp=x-y;
    else if(nx) cmp=-1;
    else if(ny) cmp=1;
    else cmp=String(x).localeCompare(String(y),'ko');
    return asc?cmp:-cmp;
  });
  const sorted=[...filled,...blanks];
  for(let i=0;i<sorted.length;i++){
    const r=n.r1+i;
    for(let c=n.c1;c<=n.c2;c++){
      record(chs,r,c);
      const cell=sorted[i].row[c-n.c1];
      if(cell) sheet().data[key(r,c)]=cell; else delete sheet().data[key(r,c)];
    }
  }
  finish(chs);
  toast(asc?'오름차순 정렬됨 (선택 영역, 첫 열 기준)':'내림차순 정렬됨 (선택 영역, 첫 열 기준)');
}
$('rb-sort').onclick=()=>{ doSort(sortAsc); sortAsc=!sortAsc; focusGrid(); };

function buildPalette(el, apply, clearLabel){
  let h='';
  for(const row of PAL_COLORS){
    h+='<div class="prow">';
    for(const col of row) h+='<span class="sw" data-col="'+col+'" style="background:'+col+'" title="'+col+'"></span>';
    h+='</div>';
  }
  h+='<button class="pclear">'+clearLabel+'</button>';
  el.innerHTML=h;
  el.addEventListener('mousedown', e=>e.preventDefault());
  el.addEventListener('click', e=>{
    const sw=e.target.closest('.sw');
    if(sw){ apply(sw.dataset.col); el.classList.remove('open'); return; }
    if(e.target.closest('.pclear')){ apply(null); el.classList.remove('open'); }
  });
}

function wireDrop(btnId, palId, applyLast){
  const btn=$(btnId), pal=$(palId);
  btn.addEventListener('mousedown', e=>e.preventDefault());
  btn.addEventListener('click', e=>{
    const rect=btn.getBoundingClientRect();
    const arrow=e.clientX>rect.right-10;
    if(arrow||e.target.classList.contains('arrow')){
      document.querySelectorAll('.palette.open').forEach(p=>{ if(p!==pal) p.classList.remove('open'); });
      pal.classList.toggle('open');
    } else { pal.classList.remove('open'); applyLast(); }
  });
}

function renderTabs(){
  const el=$('sheet-tabs');

    const t=document.createElement('div');
    t.className='stab'+(i===cur?' active':'');

      const span=t.querySelector('.rn');
      span.contentEditable='plaintext-only';
      span.focus();
      document.getSelection().selectAllChildren(span);
      const done=()=>{
        span.contentEditable='false';
        const nm=span.textContent.trim()||s.name;
        s.name=nm; renderTabs(); focusGrid();
      };
      span.addEventListener('blur', done, {once:true});
      span.addEventListener('keydown', ev=>{ if(ev.key==='Enter'){ ev.preventDefault(); span.blur(); } });
    });
    el.appendChild(t);
  });
}

/* ══════════════ 최종 수정 타임스탬프 (배포본 신선도 표시) ══════════════ */
/* BUILD_TS = 최종 수정 기점(epoch ms). 소스를 고칠 때마다 이 값을 현재 시각으로 갱신. */
const BUILD_TS = 1783663731654;   // 2026-07-10 15:08 KST
function relUpdated(ts){
  const s = Math.max(0, (Date.now()-ts)/1000);
  if(s < 45) return '방금 전 수정됨';
  const m = Math.floor(s/60);
  if(m < 60) return m+'분 전 수정 완료';
  const h = Math.floor(m/60);
  if(h < 24) return h+'시간 전 수정 완료';
  return Math.floor(h/24)+'일 전 수정 완료';
}
function refreshUpdated(){
  const el=$('sb-updated'); if(!el) return;
  const d=new Date(BUILD_TS), p=n=>String(n).padStart(2,'0');
  const mins=(Date.now()-BUILD_TS)/60000;
  el.querySelector('.utxt').textContent = relUpdated(BUILD_TS);
  el.querySelector('.dot').className = 'dot '+(mins<10?'fresh':(mins<60*24?'recent':'old'));
  el.title = '최종 수정: '+d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
}
refreshUpdated();
setInterval(refreshUpdated, 30000);

/* ══════════════ 가로 스크롤바를 시트탭 줄 오른쪽으로 (엑셀식 프록시) ══════════════ */
const hbar=$('hbar'), hbarSp=$('hbar-sp');
function activeScrollView(){
  const dv=$('data-view'), cv=$('chart-view');
  if(dv.style.display!=='none') return dv;
  if(cv.style.display!=='none') return cv;
  return null;
}
function syncHBar(){
  const av=activeScrollView();
  if(!av){ hbarSp.style.width='0'; return; }
  const maxScroll=av.scrollWidth-av.clientWidth;
  if(maxScroll<=1){ hbarSp.style.width='0'; return; }      // 넘치지 않으면 스크롤바 숨김
  hbarSp.style.width=(hbar.clientWidth+maxScroll)+'px';     // 프록시 이동거리 = 실제 이동거리(1:1)
  if(Math.abs(hbar.scrollLeft-av.scrollLeft)>0.5) hbar.scrollLeft=av.scrollLeft;
}
hbar.addEventListener('scroll',()=>{ const av=activeScrollView(); if(av && Math.abs(av.scrollLeft-hbar.scrollLeft)>0.5) av.scrollLeft=hbar.scrollLeft; });
['data-view','chart-view'].forEach(id=>$(id).addEventListener('scroll',()=>{
  const av=activeScrollView(); if(av===$(id) && Math.abs(hbar.scrollLeft-av.scrollLeft)>0.5) hbar.scrollLeft=av.scrollLeft;
}));

/* ══════════════ 측정 더미 데이터 (QC 검사표) ══════════════ */
function buildQCSheet(name, pts, serials, meta){
  const P=Math.min(pts.length, MAX_POINTS), N=Math.min(serials.length, ROWS-13);   // 격자 한도 방어
  const headerRow=2, specRow=3, upperRow=4, lowerRow=5, dhdrRow=6, dataStart=7;
  const dataEnd=dataStart+N-1;
  const inspRow=dataEnd+1, avgRow=dataEnd+2, minRow=dataEnd+3, maxRow=dataEnd+4,
        uNGRow=dataEnd+5, lNGRow=dataEnd+6, judgeRow=dataEnd+7;
  const sh=newSheet(name); sh.kind='data'; sh.meta=meta||null;   // 무거운 그리드 대신 요약 뷰로 표시
  sh.colW[0]=104;
  for(let c=1;c<=P;c++) sh.colW[c]=58;
  const put=(row,c,v,s)=>{ const cell={v:String(v)}; if(s) cell.s=Object.assign({},s); sh.data[key(row-1,c)]=cell; };

  const ST={
    title:{b:true,fs:15,col:'#107C41'},
    lbl:{b:true,fill:'#E2EFDA',al:'left'},
    phdr:{b:true,fill:'#107C41',col:'#FFFFFF',al:'center'},
    spec:{al:'center',dec:3,fill:'#F2F2F2'},
    limU:{al:'center',dec:3,fill:'#FCEFEF',col:'#C00000'},
    limL:{al:'center',dec:3,fill:'#EEF3FC',col:'#1F5FC0'},
    dhdr:{b:true,fill:'#2E74B5',col:'#FFFFFF',al:'center'},
    serial:{al:'center',fill:'#EAF0FB'},
    meas:{dec:3},
    ngU:{dec:3,fill:'#FFC7CE',col:'#9C0006',b:true},
    ngL:{dec:3,fill:'#FFEB9C',col:'#9C6500',b:true},
    sumLbl:{b:true,fill:'#FCE4D6',al:'left'},
    sumV:{al:'center',dec:3,fill:'#FFF7F0'},
    sumI:{al:'center',fill:'#FFF7F0',b:true},
    ngUcell:{al:'center',b:true,fill:'#FFC7CE',col:'#9C0006'},
    ngLcell:{al:'center',b:true,fill:'#FFEB9C',col:'#9C6500'},
    sumOk:{al:'center',b:true,fill:'#F2F7F4'},
    judgeOK:{al:'center',b:true,fill:'#107C41',col:'#FFFFFF'},
    judgeNG:{al:'center',b:true,fill:'#C00000',col:'#FFFFFF'},
  };

  // 제목 · 좌측 라벨
  put(1,0,'■ 측정 데이터',ST.title);
  put(headerRow,0,'포인트 No',ST.phdr);
  put(specRow,0,'스펙 치수',ST.lbl);
  put(upperRow,0,'상한(USL)',ST.lbl);
  put(lowerRow,0,'하한(LSL)',ST.lbl);
  put(dhdrRow,0,'시리얼 No',ST.dhdr);
  put(inspRow,0,'검사 수',ST.sumLbl);
  put(avgRow,0,'평균',ST.sumLbl);
  put(minRow,0,'최소값',ST.sumLbl);
  put(maxRow,0,'최대값',ST.sumLbl);
  put(uNGRow,0,'상한 NG',ST.sumLbl);
  put(lNGRow,0,'하한 NG',ST.sumLbl);
  put(judgeRow,0,'판정',ST.sumLbl);

  // 포인트별 스펙/상한/하한
  const uCount=[],lCount=[];
  for(let c=1;c<=P;c++){
    const p=pts[c-1]; uCount[c]=0; lCount[c]=0;
    put(headerRow,c,p.no,ST.phdr);
    put(specRow,c,isFinite(p.spec)?p.spec.toFixed(3):'',ST.spec);
    put(upperRow,c,isFinite(p.usl)?p.usl.toFixed(3):'',ST.limU);
    put(lowerRow,c,isFinite(p.lsl)?p.lsl.toFixed(3):'',ST.limL);
    put(dhdrRow,c,p.no,ST.dhdr);
  }

  // 시리얼 시료 × 포인트 측정치
  for(let i=0;i<N;i++){
    const row=dataStart+i;
    put(row,0,serials[i],ST.serial);
    for(let c=1;c<=P;c++){
      const p=pts[c-1], val=p.values[i];
      if(val==null||!isFinite(val)) continue;
      let st=ST.meas;
      if(isFinite(p.usl)&&val>p.usl){ st=ST.ngU; uCount[c]++; }
      else if(isFinite(p.lsl)&&val<p.lsl){ st=ST.ngL; lCount[c]++; }
      put(row,c,val.toFixed(3),st);
    }
  }

  // 요약: 실제 수식으로 계산 (평균 / 최소 / 최대 / 상한NG / 하한NG / 판정)
  for(let c=1;c<=P;c++){
    const L=colName(c);
    const rng=L+dataStart+':'+L+dataEnd;
    put(inspRow,c,'=COUNT('+rng+')',ST.sumI);
    put(avgRow,c,'=AVERAGE('+rng+')',ST.sumV);
    put(minRow,c,'=MIN('+rng+')',ST.sumV);
    put(maxRow,c,'=MAX('+rng+')',ST.sumV);
    put(uNGRow,c,'=COUNTIF('+rng+',">"&'+L+upperRow+')', uCount[c]>0?ST.ngUcell:ST.sumOk);
    put(lNGRow,c,'=COUNTIF('+rng+',"<"&'+L+lowerRow+')', lCount[c]>0?ST.ngLcell:ST.sumOk);
    const bad=uCount[c]+lCount[c]>0;
    put(judgeRow,c,'=IF('+L+uNGRow+'+'+L+lNGRow+'=0,"OK","NG")', bad?ST.judgeNG:ST.judgeOK);
  }
  return sh;
}
/* 랜덤 더미 데이터 생성 → buildQCSheet */
function genQCData(name){
  const P=30, N=200;
  const r3=x=>Math.round(x*1000)/1000;
  const gauss=()=>{ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); };
  const meta=[];
  for(let c=0;c<P;c++){ const nom=r3(3+Math.random()*12), t=r3(0.05+Math.random()*0.10); meta.push({no:pad2(c+1),spec:nom,usl:r3(nom+t),lsl:r3(nom-t),tol:t}); }
  const serials=[]; let serial=24070000+Math.floor(Math.random()*50);
  for(let i=0;i<N;i++){ serial+=1+Math.floor(Math.random()*4); serials.push(serial); }
  const pts=[];
  for(let c=0;c<P;c++){ const m=meta[c], values=[];
    for(let i=0;i<N;i++){ let val=m.spec+gauss()*m.tol*0.42; const roll=Math.random();
      if(roll<0.015) val=m.usl+Math.random()*m.tol*0.6; else if(roll>0.985) val=m.lsl-Math.random()*m.tol*0.6;
      values.push(r3(val)); }
    pts.push({no:m.no,spec:m.spec,usl:m.usl,lsl:m.lsl,values}); }
  const metaInfo={ model:'DUMMY-A', pn:'PN-1234', lot:'LOT-'+(700+Math.floor(Math.random()*300)), date:'2026-07-09', jig:'CMM-01', program:'demo.exe' };
  return buildQCSheet(name,pts,serials,metaInfo);
}

/* ── CSV 파싱 (템플릿 양식) → {pts, serials} ── */
function splitCSVLine(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){ const ch=line[i];
    if(q){ if(ch==='"'){ if(line[i+1]==='"'){ cur+='"'; i++; } else q=false; } else cur+=ch; }
    else { if(ch==='"') q=true; else if(ch===',') { out.push(cur); cur=''; } else cur+=ch; } }
  out.push(cur); return out;
}
function parseMeasurementCSV(text){
  const rows=text.replace(/\r/g,'').split('\n').filter(l=>l.trim()!=='').map(splitCSVLine);
  return parseMeasurementRows(rows);
}
/* rows: 2차원 배열(문자열). CSV·xlsx 공용 파서. 한도(포인트 60 / 시료 ROWS-13) 초과분은 잘림 */
function parseMeasurementRows(rows){
  rows=(rows||[]).filter(r=>r && r.some(c=>String(c==null?'':c).trim()!==''));
  const cell=(r,c)=>String(r&&r[c]!=null?r[c]:'');
  const norm=s=>String(s==null?'':s).replace(/\s|\(|\)/g,'');
  const find=kw=>rows.find(r=>norm(r&&r[0]).includes(kw));
  const hdr=find('포인트'), specR=find('스펙'),
    uR=find('상한')||rows.find(r=>/USL/i.test(cell(r,0))),
    lR=find('하한')||rows.find(r=>/LSL/i.test(cell(r,0)));
  if(!hdr||!specR||!uR||!lR) return null;
  let Praw=0; for(let c=1;c<hdr.length;c++){ if(cell(hdr,c).trim()!=='') Praw=c; else break; }
  if(Praw<1) return null;
  const P=Math.min(Praw, MAX_POINTS);
  const pts=[];
  for(let c=1;c<=P;c++) pts.push({no:cell(hdr,c).trim()||pad2(c), spec:Number(specR[c]), usl:Number(uR[c]), lsl:Number(lR[c]), values:[]});
  if(!pts.every(p=>isFinite(p.usl)&&isFinite(p.lsl))) return null;
  const sHdr=rows.findIndex(r=>/시리얼|serial/i.test(cell(r,0)));
  const start=sHdr>=0?sHdr+1:rows.indexOf(lR)+1;
  const maxN=ROWS-13, serials=[]; let moreRows=false;
  for(let ri=start; ri<rows.length; ri++){ const s0=cell(rows[ri],0).trim(), sn=Number(s0);
    if(s0===''||!isFinite(sn)) continue;
    if(serials.length>=maxN){ moreRows=true; break; }
    serials.push(sn);
    for(let c=1;c<=P;c++){ const v=Number(rows[ri][c]); pts[c-1].values.push(isFinite(v)?v:null); } }
  if(!serials.length) return null;
  return {pts, serials, truncated: Praw>MAX_POINTS || moreRows};
}
/* 세로 테스트 로그(#INIT…#TEST…#END 블록이 대당 1개씩 반복) → 항목명으로 피벗 → {pts, serials} */
function parseTestLogRows(rows){
  const cell=(r,c)=>String(r&&r[c]!=null?r[c]:'');
  const kv=r=>{ const a=cell(r,0); const i=a.indexOf(':'); if(i<0) return null; const key=a.slice(0,i).trim(); let val=a.slice(i+1).trim(); if(val==='') val=cell(r,1).trim(); return {key,val}; };
  const units=[], itemOrder=[], seen=new Set(), limits={}, headerKV={};
  let cur=null, inTest=false;
  for(const r of (rows||[])){
    const k=cell(r,0).trim();
    if(k==='#INIT'){ cur={serial:null, map:{}}; units.push(cur); inTest=false; continue; }
    if(!cur) continue;
    if(k==='#TEST'){ inTest=true; continue; }
    if(k==='#END'){ inTest=false; continue; }
    if(/^[\/*=]/.test(k)) continue;                 // 주석행(/*=== 등) 스킵
    const c1=cell(r,1), m1=c1===''?NaN:Number(c1);
    if(inTest && k && !/:/.test(k) && isFinite(m1)){ // 측정행: 항목,측정값,하한,상한,P/F,시간
      const item=k, low=Number(cell(r,2)), up=Number(cell(r,3));
      if(!seen.has(item)){ seen.add(item); itemOrder.push(item); }
      if(!limits[item] && (isFinite(low)||isFinite(up))) limits[item]={low,up};
      cur.map[item]=m1;
      continue;
    }
    const p=kv(r);                                   // 헤더/푸터 KEY:value
    if(p){
      const K=p.key.toUpperCase().replace(/\s/g,'');
      if(cur.serial==null && /(SERIAL|S\/?N|BARCODE|시리얼|시료)/.test(K)) cur.serial=p.val||null;
      if(units.length===1) headerKV[K]=p.val;        // 첫 블록 헤더 → 메타데이터
    }
  }
  const valid=units.filter(u=>Object.keys(u.map).length);
  if(!valid.length || !itemOrder.length) return null;
  const meta={ model:headerKV['MODEL']||headerKV['모델']||null, pn:headerKV['P/N']||headerKV['PN']||headerKV['품번']||null,
    lot:headerKV['RTM_LOT']||headerKV['LOT']||headerKV['로트']||null, date:headerKV['DATE']||headerKV['검사일']||null,
    jig:headerKV['JIG']||headerKV['TESTCODE']||null, program:headerKV['PROGRAM']||headerKV['INIFILE']||null };
  const P=Math.min(itemOrder.length, MAX_POINTS), useItems=itemOrder.slice(0,P);
  const maxN=ROWS-13, useUnits=valid.slice(0,maxN);
  const pts=useItems.map(item=>{ const l=limits[item]||{}, lo=Number(l.low), hi=Number(l.up);
    const low=isFinite(lo)?lo:NaN, up=isFinite(hi)?hi:NaN;
    const spec=(isFinite(low)&&isFinite(up))?(low+up)/2:(isFinite(up)?up:low);
    return {no:item, spec, usl:up, lsl:low, values:[]}; });
  const serials=useUnits.map((u,i)=> (u.serial!=null&&u.serial!=='')? u.serial : ('U'+String(i+1).padStart(4,'0')));
  useUnits.forEach(u=>{ for(let j=0;j<P;j++){ const v=u.map[useItems[j]]; pts[j].values.push(v==null?null:v); } });
  return {pts, serials, meta, truncated: itemOrder.length>MAX_POINTS || valid.length>maxN};
}
